<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 缘来是你</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase 配置 -->
    <script type="module" src="/supabase-config.js"></script>
    <!-- Supabase 服务 -->
    <script type="module" src="/services/supabase-service.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        h1 {
            color: #c44569;
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .type-btn:hover { border-color: #ff6b9d; }
        .type-btn.active {
            border-color: #ff6b9d;
            background: linear-gradient(135deg, #ff6b9d10 0%, #c4456910 100%);
        }
        .type-btn .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .type-btn .title { font-weight: 600; color: #333; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff6b9d;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .link a {
            color: #c44569;
            text-decoration: none;
            font-weight: 500;
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .agency-fields {
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            border: 2px solid #667eea30;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .agency-fields .title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .hidden { display: none; }
        .agree {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
        .agree a { color: #c44569; }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>💕 免费注册</h1>
        <p class="subtitle">开启您的寻缘之旅</p>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="type-selector">
            <div class="type-btn active" id="typePersonal" onclick="selectType('personal')">
                <div class="icon">👤</div>
                <div class="title">个人用户</div>
            </div>
            <div class="type-btn" id="typeAgency" onclick="selectType('agency')">
                <div class="icon">🏢</div>
                <div class="title">中介公司</div>
            </div>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="phone">手机号码 *</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码 *</label>
                <input type="password" id="password" placeholder="请设置密码（6-20位）" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码 *</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            
            <div id="agencySection" class="hidden">
                <div class="agency-fields">
                    <div class="title">🏢 中介公司信息</div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label for="agencyName">公司名称 *</label>
                        <input type="text" id="agencyName" placeholder="请输入公司名称">
                    </div>
                    <div class="form-group">
                        <label for="agencyLicense">营业执照号</label>
                        <input type="text" id="agencyLicense" placeholder="请输入营业执照号">
                    </div>
                </div>
            </div>
            
            <div class="agree">
                <input type="checkbox" id="agree" required>
                <label for="agree">我已阅读并同意<a href="terms.html">《用户服务协议》</a>和<a href="privacy.html">《隐私政策》</a></label>
            </div>
            
            <button type="submit" class="btn">立即注册</button>
        </form>
        
        <div class="link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
        
        <div class="link" style="font-size: 13px;">
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script type="module">
        import { UserService } from '/services/supabase-service.js';
        
        let registerType = 'personal';
        
        window.selectType = function(type) {
            registerType = type;
            document.getElementById('typePersonal').classList.toggle('active', type === 'personal');
            document.getElementById('typeAgency').classList.toggle('active', type === 'agency');
            document.getElementById('agencySection').classList.toggle('hidden', type !== 'agency');
        }
        
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!validatePhone(phone)) {
                document.getElementById('errorMessage').textContent = '请输入正确的手机号码';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                document.getElementById('errorMessage').textContent = '密码长度不能少于6位';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('errorMessage').textContent = '两次输入的密码不一致';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (registerType === 'agency') {
                const agencyName = document.getElementById('agencyName').value.trim();
                if (!agencyName) {
                    document.getElementById('errorMessage').textContent = '请填写公司名称';
                    document.getElementById('errorMessage').style.display = 'block';
                    return;
                }
            }
            
            try {
                const newUser = {
                    phone: phone,
                    password: password,
                    nickname: registerType === 'personal' ? '用户' : '中介',
                    role: registerType,
                    status: registerType === 'personal' ? 'approved' : 'pending',
                    registeredat: new Date().toISOString(),
                    gender: '',
                    realname: '',
                    birthday: '',
                    age: null,
                    height: null,
                    weight: '',
                    city: '',
                    hometown: '',
                    maritalstatus: '',
                    education: '',
                    occupation: '',
                    income: '',
                    description: '',
                    photos: [],
                    smoking: '',
                    drinking: '',
                    religion: '',
                    character: '',
                    hobbies: [],
                    offlineactivities: [],
                    petaccept: '',
                    schedule: '',
                    financialview: '',
                    livewithparents: '',
                    expectedchildren: '',
                    openmode: 'open',
                    registeredby: '',
                    agencyname: registerType === 'agency' ? document.getElementById('agencyName').value.trim() : ''
                };
                
                const result = await UserService.register(newUser);
                
                if (result.success) {
                    localStorage.setItem('datingCurrentUser', JSON.stringify(result.user));
                    
                    document.getElementById('errorMessage').style.display = 'none';
                    
                    if (registerType === 'personal') {
                        document.getElementById('successMessage').textContent = '注册成功！请完善个人资料';
                        document.getElementById('successMessage').style.display = 'block';
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 1500);
                    } else {
                        document.getElementById('successMessage').textContent = '注册成功！请等待管理员审核';
                        document.getElementById('successMessage').style.display = 'block';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                } else {
                    document.getElementById('errorMessage').textContent = result.message;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = '注册失败：' + error.message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>

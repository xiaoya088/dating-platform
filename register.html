<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 注册</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <div class="card-header" style="text-align: center;">
                💕 注册账号
            </div>
            
            <div class="tabs" style="justify-content: center;">
                <button class="tab-btn active" id="tabBtnUser">用户注册</button>
                <button class="tab-btn" id="tabBtnAgency">中介注册</button>
            </div>
            
            <div id="userTab" class="tab-content" style="display: block;">
                <div id="userStep1">
                    <div class="form-group">
                        <label>手机号 *</label>
                        <input type="tel" id="userPhone" placeholder="请输入手机号" maxlength="11">
                    </div>
                    <p style="color: #888; font-size: 14px; margin-bottom: 20px;">
                        输入手机号后点击注册，系统将自动创建账号
                    </p>
                    <button class="btn btn-primary btn-block" id="btnUserRegister">注册</button>
                </div>
                
                <div id="userStep2" class="hidden">
                    <div class="alert alert-success">
                        注册成功！请设置登录密码
                    </div>
                    <div class="form-group">
                        <label>设置密码 *</label>
                        <input type="password" id="userPassword" placeholder="请设置密码（至少6位）">
                    </div>
                    <div class="form-group">
                        <label>确认密码 *</label>
                        <input type="password" id="userPasswordConfirm" placeholder="请再次输入密码">
                    </div>
                    <button class="btn btn-primary btn-block" id="btnUserSetPassword">设置密码</button>
                </div>
            </div>
            
            <div id="agencyTab" class="tab-content" style="display: none;">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" id="agencyUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" id="agencyPassword" placeholder="请设置密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认密码 *</label>
                    <input type="password" id="agencyPasswordConfirm" placeholder="请再次输入密码">
                </div>
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="agencyName" placeholder="中介名称或公司名">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="agencyPhone" placeholder="联系手机号" maxlength="11">
                </div>
                <button class="btn btn-primary btn-block" id="btnAgencyRegister">注册</button>
            </div>
            
            <p style="text-align: center; margin-top: 20px; color: #888;">
                已有账号？<a href="index.html" style="color: #667eea;">立即登录</a>
            </p>
            
            <div id="alertBox" class="hidden"></div>
        </div>
    </div>
    
    <script>
        let registeredPhone = '';
        
        document.getElementById('tabBtnUser').addEventListener('click', () => switchTab('user'));
        document.getElementById('tabBtnAgency').addEventListener('click', () => switchTab('agency'));
        document.getElementById('btnUserRegister').addEventListener('click', userRegister);
        document.getElementById('btnUserSetPassword').addEventListener('click', userSetPassword);
        document.getElementById('btnAgencyRegister').addEventListener('click', agencyRegister);
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            
            document.getElementById('tabBtn' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
            document.getElementById(tabName + 'Tab').style.display = 'block';
        }
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
        }
        
        function isValidPhone(phone) {
            if (!/^\d{11}$/.test(phone)) return false;
            if (phone.charAt(0) !== '1') return false;
            
            const secondDigit = phone.charAt(1);
            if (!['3', '4', '5', '6', '7', '8', '9'].includes(secondDigit)) return false;
            
            const validPrefixes = [
                '130', '131', '132', '133', '134', '135', '136', '137', '138', '139',
                '145', '147', '148',
                '150', '151', '152', '153', '155', '156', '157', '158', '159',
                '162', '165', '166', '167',
                '170', '171', '172', '173', '175', '176', '177', '178',
                '180', '181', '182', '183', '184', '185', '186', '187', '188', '189',
                '191', '192', '193', '195', '196', '197', '198', '199'
            ];
            
            const prefix = phone.substring(0, 3);
            return validPrefixes.includes(prefix);
        }
        
        async function userRegister() {
            const phone = document.getElementById('userPhone').value.trim();
            
            if (!phone) {
                showAlert('请输入手机号', 'error');
                return;
            }
            
            if (!/^\d{11}$/.test(phone)) {
                showAlert('手机号必须是11位数字', 'error');
                return;
            }
            
            if (!isValidPhone(phone)) {
                showAlert('请输入有效的手机号', 'error');
                return;
            }
            
            try {
                const user = await signUp(phone, '', { status: 'pending_password' });
                registeredPhone = phone;
                
                document.getElementById('userStep1').classList.add('hidden');
                document.getElementById('userStep2').classList.remove('hidden');
                
                setCurrentUser({ ...user, role: 'user' });
            } catch (error) {
                if (error.message.includes('duplicate')) {
                    showAlert('该手机号已注册', 'error');
                } else {
                    showAlert('注册失败：' + error.message, 'error');
                }
            }
        }
        
        async function userSetPassword() {
            const password = document.getElementById('userPassword').value;
            const passwordConfirm = document.getElementById('userPasswordConfirm').value;
            
            if (!password || !passwordConfirm) {
                showAlert('请输入密码', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('密码至少需要6位', 'error');
                return;
            }
            
            if (password !== passwordConfirm) {
                showAlert('两次密码不一致', 'error');
                return;
            }
            
            try {
                const supabase = getSupabase();
                const currentUser = getCurrentUser();
                
                const { error } = await supabase
                    .from('users')
                    .update({ password: password, status: 'active' })
                    .eq('id', currentUser.id);
                
                if (error) throw error;
                
                showAlert('密码设置成功', 'success');
                
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1000);
            } catch (error) {
                showAlert('设置密码失败：' + error.message, 'error');
            }
        }
        
        async function agencyRegister() {
            const username = document.getElementById('agencyUsername').value.trim();
            const password = document.getElementById('agencyPassword').value;
            const passwordConfirm = document.getElementById('agencyPasswordConfirm').value;
            const name = document.getElementById('agencyName').value.trim();
            const phone = document.getElementById('agencyPhone').value.trim();
            
            if (!username) {
                showAlert('请输入用户名', 'error');
                return;
            }
            
            if (!password || !passwordConfirm) {
                showAlert('请输入密码', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('密码至少需要6位', 'error');
                return;
            }
            
            if (password !== passwordConfirm) {
                showAlert('两次密码不一致', 'error');
                return;
            }
            
            if (phone) {
                if (!/^\d{11}$/.test(phone)) {
                    showAlert('手机号必须是11位数字', 'error');
                    return;
                }
                if (!isValidPhone(phone)) {
                    showAlert('请输入有效的手机号', 'error');
                    return;
                }
            }
            
            try {
                const supabase = getSupabase();
                
                const { data: existing } = await supabase
                    .from('agencies')
                    .select('id')
                    .eq('username', username)
                    .single();
                
                if (existing) {
                    showAlert('该用户名已被使用', 'error');
                    return;
                }
                
                const { data, error } = await supabase
                    .from('agencies')
                    .insert([{
                        username: username,
                        password: password,
                        name: name,
                        phone: phone,
                        status: 'active'
                    }])
                    .select()
                    .single();
                
                if (error) throw error;
                
                setCurrentUser({ ...data, role: 'agency' });
                showAlert('注册成功', 'success');
                
                setTimeout(() => {
                    window.location.href = 'agency.html';
                }, 1000);
            } catch (error) {
                showAlert('注册失败：' + error.message, 'error');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 缘来是你</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase 配置 -->
    <script type="module" src="/supabase-config.js"></script>
    <!-- Supabase 服务 -->
    <script type="module" src="/services/supabase-service.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        h1 {
            color: #c44569;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff6b9d;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #c44569;
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover { text-decoration: underline; }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>💕 登录</h1>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="phone">手机号码</label>
                <input type="tel" id="phone" placeholder="请输入手机号码" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="rememberMe" checked style="width: 20px; height: 20px;">
                    <span style="font-weight: normal; color: #555;">记住我</span>
                </label>
            </div>
            
            <button type="submit" class="btn">登录</button>
        </form>
        
        <div class="link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
        

        <div class="link" style="font-size: 12px; margin-top: 30px;">
            <a href="terms.html">用户服务协议</a> | <a href="privacy.html">隐私政策</a>
        </div>

        <div class="link" style="font-size: 14px;">
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        const ADMIN_PHONE = '13800138000';
        
        function initAdmin() {
            let users = JSON.parse(localStorage.getItem('datingUsers')) || [];
            const adminExists = users.find(u => u.phone === ADMIN_PHONE);
            
            if (!adminExists) {
                const admin = {
                    id: Date.now(),
                    gender: '男',
                    username: '管理员',
                    age: 30,
                    phone: ADMIN_PHONE,
                    password: 'admin123',
                    education: '本科',
                    occupation: '管理员',
                    city: '北京',
                    description: '系统管理员',
                    status: 'approved',
                    createdAt: new Date().toLocaleString('zh-CN'),
                    profileCompleted: true,
                    role: 'admin'
                };
                users.push(admin);
                localStorage.setItem('datingUsers', JSON.stringify(users));
            } else {
                const adminIndex = users.findIndex(u => u.phone === ADMIN_PHONE);
                users[adminIndex].password = 'admin123';
                users[adminIndex].role = 'admin';
                users[adminIndex].status = 'approved';
                localStorage.setItem('datingUsers', JSON.stringify(users));
            }
        }
        
        function loadRememberedUser() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                const user = JSON.parse(rememberedUser);
                document.getElementById('phone').value = user.phone || '';
                if (user.rememberPassword && user.password) {
                    document.getElementById('password').value = user.password;
                }
            }
        }
        
        async function autoLogin() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                const user = JSON.parse(rememberedUser);
                if (user.rememberPassword && user.phone && user.password) {
                    try {
                        const users = JSON.parse(localStorage.getItem('datingUsers')) || [];
                        const foundUser = users.find(u => u.phone === user.phone && u.password === user.password);
                        
                        if (foundUser && foundUser.status !== 'pending') {
                            localStorage.setItem('datingCurrentUser', JSON.stringify(foundUser));
                            
                            if (foundUser.phone === ADMIN_PHONE || foundUser.role === 'admin') {
                                window.location.href = 'admin.html';
                            } else if (foundUser.role === 'agency') {
                                window.location.href = 'agency.html';
                            } else {
                                window.location.href = 'profile.html';
                            }
                            return true;
                        }
                    } catch (e) {
                        console.log('自动登录失败:', e);
                    }
                }
            }
            return false;
        }
        
        initAdmin();
        
        autoLogin().then(success => {
            if (!success) {
                loadRememberedUser();
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            const users = JSON.parse(localStorage.getItem('datingUsers')) || [];
            const user = users.find(u => u.phone === phone);
            
            if (!user) {
                document.getElementById('errorMessage').textContent = '该手机号未注册';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            if (user.status === 'pending' && phone !== ADMIN_PHONE) {
                document.getElementById('errorMessage').textContent = '账号正在审核中，请稍后再试';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            if (!user.password || user.password === '') {
                document.getElementById('errorMessage').textContent = '请先设置密码';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                localStorage.setItem('tempUserId', user.id);
                setTimeout(() => {
                    window.location.href = 'setpassword.html';
                }, 1500);
                return;
            }
            
            if (user.password !== password) {
                document.getElementById('errorMessage').textContent = '密码错误';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            if (rememberMe) {
                localStorage.setItem('rememberedUser', JSON.stringify({
                    phone: phone,
                    password: password,
                    rememberPassword: true
                }));
            } else {
                localStorage.removeItem('rememberedUser');
            }
            
            localStorage.setItem('datingCurrentUser', JSON.stringify(user));
            
            if (phone === ADMIN_PHONE || user.role === 'admin') {
                window.location.href = 'admin.html';
            } else if (user.role === 'agency') {
                window.location.href = 'agency.html';
            } else {
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>
</html>

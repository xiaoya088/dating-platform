<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 中介后台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">💕 中介后台</div>
        <ul class="navbar-nav">
            <li><a href="#" onclick="showTab('clients')" class="active" id="navClients">客户管理</a></li>
            <li><a href="#" onclick="showTab('requests')">联系请求</a></li>
            <li><a href="#" onclick="logout()">退出</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="clients">客户管理</button>
            <button class="tab-btn" data-tab="requests">联系请求</button>
            <button class="tab-btn" data-tab="add">录入客户</button>
        </div>
        
        <div id="clientsTab" class="tab-content active">
            <div class="card">
                <div class="card-header">我的客户</div>
                
                <div class="search-box">
                    <input type="text" id="searchClient" placeholder="搜索姓名或手机号">
                    <button class="btn btn-secondary" onclick="searchClients()">搜索</button>
                </div>
                
                <div id="clientList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="requestsTab" class="tab-content hidden">
            <div class="card">
                <div class="card-header">联系请求</div>
                
                <div id="requestList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="addTab" class="tab-content hidden">
            <div class="card">
                <div class="card-header">录入新客户 ★ 必填项标记</div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">登录信息</h4>
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>手机号（登录账号） *</label>
                            <input type="tel" id="clientPhone" maxlength="11" placeholder="11位手机号">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>密码 *</label>
                            <input type="text" id="clientPassword" placeholder="默认生成，可修改">
                        </div>
                    </div>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">基本信息</h4>
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>姓名（展示昵称） *</label>
                            <input type="text" id="clientName" placeholder="请输入姓名">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>性别 *</label>
                            <select id="clientGender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>出生日期 *</label>
                            <input type="date" id="clientBirthday">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>身高 (cm) *</label>
                            <input type="number" id="clientHeight" placeholder="如: 175">
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>现居地 *</label>
                            <input type="text" id="clientCurrentAddress" placeholder="如: 广东省深圳市南山区">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>户籍地 *</label>
                            <input type="text" id="clientHukou" placeholder="如: 北京市朝阳区">
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>婚姻状况 *</label>
                    <select id="clientMaritalStatus">
                        <option value="">请选择</option>
                        <option value="未婚">未婚</option>
                        <option value="离异">离异</option>
                        <option value="丧偶">丧偶</option>
                    </select>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">外貌生活</h4>
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>学历 ★</label>
                            <select id="clientEducation">
                                <option value="">请选择</option>
                                <option value="小学">小学</option>
                                <option value="初中">初中</option>
                                <option value="高中">高中</option>
                                <option value="大专">大专</option>
                                <option value="本科">本科</option>
                                <option value="硕士">硕士</option>
                                <option value="博士">博士</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>职业 ★</label>
                            <input type="text" id="clientOccupation" placeholder="如: 程序员">
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>体重 (kg)</label>
                            <input type="number" id="clientWeight" placeholder="如: 65">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>年收入</label>
                            <select id="clientIncome">
                                <option value="">请选择</option>
                                <option value="3000以下">3000以下</option>
                                <option value="3000-5000">3000-5000</option>
                                <option value="5000-8000">5000-8000</option>
                                <option value="8000-10000">8000-10000</option>
                                <option value="10000-15000">10000-15000</option>
                                <option value="15000-20000">15000-20000</option>
                                <option value="20000-30000">20000-30000</option>
                                <option value="30000以上">30000以上</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>房产</label>
                            <select id="clientProperty">
                                <option value="">请选择</option>
                                <option value="有房">有房</option>
                                <option value="无房">无房</option>
                                <option value="与父母同住">与父母同住</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>车辆</label>
                            <select id="clientCar">
                                <option value="">请选择</option>
                                <option value="有车">有车</option>
                                <option value="无车">无车</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>吸烟</label>
                            <select id="clientSmoking">
                                <option value="">请选择</option>
                                <option value="不吸烟">不吸烟</option>
                                <option value="偶尔吸">偶尔吸</option>
                                <option value="经常吸">经常吸</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>饮酒</label>
                            <select id="clientDrinking">
                                <option value="">请选择</option>
                                <option value="不饮酒">不饮酒</option>
                                <option value="偶尔喝">偶尔喝</option>
                                <option value="经常喝">经常喝</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>宗教信仰</label>
                            <input type="text" id="clientReligion" placeholder="如: 佛教、基督教等">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>微信号</label>
                            <input type="text" id="clientWechat" placeholder="请输入微信号">
                        </div>
                    </div>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">性格与兴趣</h4>
                <div class="form-group">
                    <label>性格自评</label>
                    <div class="checkbox-group" id="clientPersonality">
                        <label class="checkbox-item"><input type="checkbox" value="开朗">开朗</label>
                        <label class="checkbox-item"><input type="checkbox" value="内向">内向</label>
                        <label class="checkbox-item"><input type="checkbox" value="稳重">稳重</label>
                        <label class="checkbox-item"><input type="checkbox" value="活泼">活泼</label>
                        <label class="checkbox-item"><input type="checkbox" value="幽默">幽默</label>
                        <label class="checkbox-item"><input type="checkbox" value="细心">细心</label>
                        <label class="checkbox-item"><input type="checkbox" value="体贴">体贴</label>
                        <label class="checkbox-item"><input type="checkbox" value="独立">独立</label>
                        <label class="checkbox-item"><input type="checkbox" value="随和">随和</label>
                        <label class="checkbox-item"><input type="checkbox" value="上进">上进</label>
                        <label class="checkbox-item"><input type="checkbox" value="乐观">乐观</label>
                        <label class="checkbox-item"><input type="checkbox" value="真诚">真诚</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>兴趣爱好</label>
                    <div class="checkbox-group" id="clientInterests">
                        <label class="checkbox-item"><input type="checkbox" value="运动健身">运动健身</label>
                        <label class="checkbox-item"><input type="checkbox" value="旅游">旅游</label>
                        <label class="checkbox-item"><input type="checkbox" value="阅读">阅读</label>
                        <label class="checkbox-item"><input type="checkbox" value="音乐">音乐</label>
                        <label class="checkbox-item"><input type="checkbox" value="电影">电影</label>
                        <label class="checkbox-item"><input type="checkbox" value="美食">美食</label>
                        <label class="checkbox-item"><input type="checkbox" value="摄影">摄影</label>
                        <label class="checkbox-item"><input type="checkbox" value="游戏">游戏</label>
                        <label class="checkbox-item"><input type="checkbox" value="宠物">宠物</label>
                        <label class="checkbox-item"><input type="checkbox" value="手工">手工</label>
                        <label class="checkbox-item"><input type="checkbox" value="绘画">绘画</label>
                        <label class="checkbox-item"><input type="checkbox" value="舞蹈">舞蹈</label>
                        <label class="checkbox-item"><input type="checkbox" value="瑜伽">瑜伽</label>
                        <label class="checkbox-item"><input type="checkbox" value="钓鱼">钓鱼</label>
                        <label class="checkbox-item"><input type="checkbox" value="园艺">园艺</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>线下活动类型（多选）</label>
                    <div class="checkbox-group" id="clientActivityTypes">
                        <label class="checkbox-item"><input type="checkbox" value="聚餐">聚餐</label>
                        <label class="checkbox-item"><input type="checkbox" value="徒步">徒步</label>
                        <label class="checkbox-item"><input type="checkbox" value="K歌">K歌</label>
                        <label class="checkbox-item"><input type="checkbox" value="桌游">桌游</label>
                        <label class="checkbox-item"><input type="checkbox" value="读书会">读书会</label>
                        <label class="checkbox-item"><input type="checkbox" value="健身">健身</label>
                        <label class="checkbox-item"><input type="checkbox" value="露营">露营</label>
                        <label class="checkbox-item"><input type="checkbox" value="看展">看展</label>
                        <label class="checkbox-item"><input type="checkbox" value="电影">电影</label>
                        <label class="checkbox-item"><input type="checkbox" value="旅游">旅游</label>
                        <label class="checkbox-item"><input type="checkbox" value="运动">运动</label>
                        <label class="checkbox-item"><input type="checkbox" value="品茶">品茶</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>是否接受宠物</label>
                            <select id="clientAcceptPet">
                                <option value="">请选择</option>
                                <option value="是">是</option>
                                <option value="否">否</option>
                                <option value="无所谓">无所谓</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>作息习惯</label>
                            <select id="clientSchedule">
                                <option value="">请选择</option>
                                <option value="早睡早起">早睡早起</option>
                                <option value="规律作息">规律作息</option>
                                <option value="夜猫子">夜猫子</option>
                                <option value="弹性作息">弹性作息</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">婚恋价值观</h4>
                <div class="form-group">
                    <label>婚后财务看法</label>
                    <select id="clientFinanceView">
                        <option value="">请选择</option>
                        <option value="AA制">AA制</option>
                        <option value="共同账户">共同账户</option>
                        <option value="男方承担">男方承担</option>
                        <option value="女方承担">女方承担</option>
                        <option value="协商处理">协商处理</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>是否与父母同住</label>
                    <select id="clientLiveWithParents">
                        <option value="">请选择</option>
                        <option value="愿意">愿意</option>
                        <option value="不愿意">不愿意</option>
                        <option value="视情况">视情况</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>期望孩子数</label>
                    <select id="clientExpectedChildren">
                        <option value="">请选择</option>
                        <option value="0">丁克</option>
                        <option value="1">1个</option>
                        <option value="2">2个</option>
                        <option value="3">3个及以上</option>
                        <option value="不限">不限</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>自我描述（最多500字）</label>
                    <textarea id="clientSelfDescription" rows="5" placeholder="描述自己的性格、爱好、婚恋观等（500字以内）" maxlength="500"></textarea>
                </div>
                
                <div class="form-group">
                    <label>婚恋宣言</label>
                    <textarea id="clientDeclaration" rows="3" placeholder="描述自己、感情观（200字以内）" maxlength="200"></textarea>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #667eea;">择偶要求</h4>
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>最小年龄</label>
                            <input type="number" id="clientReqMinAge" placeholder="如: 25">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>最大年龄</label>
                            <input type="number" id="clientReqMaxAge" placeholder="如: 35">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>年龄重要程度</label>
                            <select id="clientAgeImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal">一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>最小身高 (cm)</label>
                            <input type="number" id="clientReqMinHeight" placeholder="如: 160">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>最大身高 (cm)</label>
                            <input type="number" id="clientReqMaxHeight" placeholder="如: 175">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>身高重要程度</label>
                            <select id="clientHeightImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal">一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>学历要求</label>
                            <div class="checkbox-group" id="clientReqEducation">
                                <label class="checkbox-item"><input type="checkbox" value="大专">大专</label>
                                <label class="checkbox-item"><input type="checkbox" value="本科">本科</label>
                                <label class="checkbox-item"><input type="checkbox" value="硕士">硕士</label>
                                <label class="checkbox-item"><input type="checkbox" value="博士">博士</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>学历重要程度</label>
                            <select id="clientEducationImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal">一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>婚姻状况要求</label>
                            <div class="checkbox-group" id="clientReqMarital">
                                <label class="checkbox-item"><input type="checkbox" value="未婚">未婚</label>
                                <label class="checkbox-item"><input type="checkbox" value="离异">离异</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>婚姻重要程度</label>
                            <select id="clientMaritalImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal">一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>现居地要求</label>
                            <input type="text" id="clientReqProvince" placeholder="如: 北京市">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>地区重要程度</label>
                            <select id="clientProvinceImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal">一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>体型偏好</label>
                            <select id="clientReqBodyType">
                                <option value="">不限</option>
                                <option value="偏瘦">偏瘦</option>
                                <option value="匀称">匀称</option>
                                <option value="健壮">健壮</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>年收入下限</label>
                            <select id="clientReqMinIncome">
                                <option value="">不限</option>
                                <option value="3000">3000</option>
                                <option value="5000">5000</option>
                                <option value="8000">8000</option>
                                <option value="10000">10000</option>
                                <option value="15000">15000</option>
                                <option value="20000">20000</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>吸烟要求</label>
                            <select id="clientReqSmoking">
                                <option value="">不限</option>
                                <option value="不吸烟">不吸烟</option>
                                <option value="偶尔吸">偶尔吸</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>饮酒要求</label>
                            <select id="clientReqDrinking">
                                <option value="">不限</option>
                                <option value="不饮酒">不饮酒</option>
                                <option value="偶尔喝">偶尔喝</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>性格偏好</label>
                    <div class="checkbox-group" id="clientReqPersonality">
                        <label class="checkbox-item"><input type="checkbox" value="开朗">开朗</label>
                        <label class="checkbox-item"><input type="checkbox" value="稳重">稳重</label>
                        <label class="checkbox-item"><input type="checkbox" value="幽默">幽默</label>
                        <label class="checkbox-item"><input type="checkbox" value="细心">细心</label>
                        <label class="checkbox-item"><input type="checkbox" value="体贴">体贴</label>
                        <label class="checkbox-item"><input type="checkbox" value="独立">独立</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>性格重要程度</label>
                            <select id="clientPersonalityImportance">
                                <option value="must">必须满足</option>
                                <option value="very_important">非常重要</option>
                                <option value="normal" selected>一般</option>
                                <option value="optional">可有可无</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>兴趣重合度要求（最低几项）</label>
                            <input type="number" id="clientReqMinInterestOverlap" placeholder="如: 2" value="2">
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>线下活动偏好（多选）</label>

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => {
                    c.classList.add('hidden');
                    c.classList.remove('active');
                });
                
                this.classList.add('active');
                const tabId = this.dataset.tab + 'Tab';
                const tabContent = document.getElementById(tabId);
                if (tabContent) {
                    tabContent.classList.remove('hidden');
                    tabContent.classList.add('active');
                }
            });

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            
            const tabBtn = document.querySelector(`[data-tab="${tabName}"]`);

            const tabContent = document.getElementById(tabName + 'Tab');
            if (tabContent) tabContent.classList.remove('hidden');

            setTimeout(() => {

        async function toggleClientStatus(clientId, currentStatus) {
            const supabase = getSupabase();

                .from('users')
                .update({ status: newStatus })
                .eq('id', clientId);
            
            if (error) {
                showAlert('操作失败', 'error');

                showAlert(newStatus === 'active' ? '已启用' : '已禁用', 'success');
                loadClients();
            }

            const newPassword = generatePassword();
            const supabase = getSupabase();
            
            const { error } = await supabase
                .from('users')
                .update({ password: newPassword })
                .eq('id', clientId);
            
            if (error) {
                showAlert('重置失败', 'error');
            } else {
                showAlert(`新密码: ${newPassword}`, 'success');

        async function addClient() {
            const name = document.getElementById('clientName').value.trim();
            const phone = document.getElementById('clientPhone').value.trim();
            const password = document.getElementById('clientPassword').value.trim();
            const gender = document.getElementById('clientGender').value;
            const birthday = document.getElementById('clientBirthday').value;
            const height = parseInt(document.getElementById('clientHeight').value) || null;
            const currentAddress = document.getElementById('clientCurrentAddress').value.trim();
            const hukou = document.getElementById('clientHukou').value.trim();
            const maritalStatus = document.getElementById('clientMaritalStatus').value;
            
            if (!name || !phone || !gender || !birthday || !height || !currentAddress || !hukou || !maritalStatus) {
                showAlert('请填写所有必填项（带 * 标记）', 'error');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showAlert('手机号格式不正确', 'error');
                return;
            }
            
            const finalPassword = password || generatePassword();
            
            const supabase = ensureSupabase();
            
            try {
                const { data: existing, error: checkError } = await supabase
                    .from('users')
                    .select('id')
                    .eq('phone', phone)
                    .single();
                
                if (checkError && checkError.code !== 'PGRST116') {
                    throw checkError;
                }
                
                if (existing) {
                    showAlert('该手机号已存在', 'error');
                    return;
                }
                
                const userData = {
                    name: name,
                    phone: phone,
                    password: finalPassword,
                    gender: gender,
                    birthday: birthday,
                    height: height,
                    current_address: currentAddress,
                    hukou: hukou,
                    marital_status: maritalStatus,
                    weight: parseInt(document.getElementById('clientWeight').value) || null,
                    education: document.getElementById('clientEducation').value,
                    occupation: document.getElementById('clientOccupation').value,
                    income: document.getElementById('clientIncome').value,
                    property: document.getElementById('clientProperty').value,
                    car: document.getElementById('clientCar').value,
                    smoking: document.getElementById('clientSmoking').value,
                    drinking: document.getElementById('clientDrinking').value,
                    religion: document.getElementById('clientReligion').value,
                    wechat: document.getElementById('clientWechat').value,
                    personality: getCheckboxValues('clientPersonality'),
                    interests: getCheckboxValues('clientInterests'),
                    activity_types: getCheckboxValues('clientActivityTypes'),
                    accept_pet: document.getElementById('clientAcceptPet').value,
                    schedule: document.getElementById('clientSchedule').value,
                    finance_view: document.getElementById('clientFinanceView').value,
                    live_with_parents: document.getElementById('clientLiveWithParents').value,
                    expected_children: document.getElementById('clientExpectedChildren').value,
                    self_description: document.getElementById('clientSelfDescription').value,
                    declaration: document.getElementById('clientDeclaration').value,
                    agency_id: currentUser.id,
                    status: 'active'
                };
                
                const { error: userError } = await supabase
                    .from('users')
                    .insert([userData]);
                
                if (userError) {
                    showAlert('录入失败：' + userError.message, 'error');
                    return;
                }
                
                const reqData = {
                    min_age: parseInt(document.getElementById('clientReqMinAge').value) || null,
                    max_age: parseInt(document.getElementById('clientReqMaxAge').value) || null,
                    age_importance: document.getElementById('clientAgeImportance').value,
                    min_height: parseInt(document.getElementById('clientReqMinHeight').value) || null,
                    max_height: parseInt(document.getElementById('clientReqMaxHeight').value) || null,
                    height_importance: document.getElementById('clientHeightImportance').value,
                    education: getCheckboxValues('clientReqEducation'),
                    education_importance: document.getElementById('clientEducationImportance').value,
                    marital_status: getCheckboxValues('clientReqMarital'),
                    marital_importance: document.getElementById('clientMaritalImportance').value,
                    province: document.getElementById('clientReqProvince').value,
                    province_importance: document.getElementById('clientProvinceImportance').value,
                    body_type: document.getElementById('clientReqBodyType').value,
                    min_income: document.getElementById('clientReqMinIncome').value,
                    smoking: document.getElementById('clientReqSmoking').value,
                    drinking: document.getElementById('clientReqDrinking').value,
                    personality: getCheckboxValues('clientReqPersonality'),
                    personality_importance: document.getElementById('clientPersonalityImportance').value,
                    min_interest_overlap: parseInt(document.getElementById('clientReqMinInterestOverlap').value) || 2,
                    activities: getCheckboxValues('clientReqActivities'),
                    min_activity_overlap: parseInt(document.getElementById('clientReqMinActivityOverlap').value) || 1,
                    values: document.getElementById('clientReqValues').value
                };
                
                const { data: newUser } = await supabase
                    .from('users')
                    .select('id')
                    .eq('phone', phone)
                    .single();
                
                if (newUser) {
                    await supabase
                        .from('requirements')
                        .insert([{ user_id: newUser.id, ...reqData }]);
                }
                
                showAlert(`录入成功！账号: ${phone}，密码: ${finalPassword}`, 'success');
                
                clearClientForm();
                showTab('clients');
                loadClients();
            } catch (e) {
                showAlert('录入失败：' + e.message, 'error');
            }
        }

        async function loadRequests() {
            const supabase = getSupabase();
            
            const { data: requests } = await supabase
                .from('agency_requests')
                .select('*, from_user:users!agency_requests_from_user_id_fkey(id, name, phone, photos)')
                .eq('agency_id', currentUser.id)
                .eq('status', 'pending')
                .order('created_at', { ascending: false });
            
            const requestList = document.getElementById('requestList');
            
            if (!requests || requests.length === 0) {
                requestList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">暂无联系请求</p>';
                return;
            }
            
            requestList.innerHTML = requests.map(req => `
                <div class="message-item">
                    <img class="message-avatar" src="${req.from_user?.photos?.[0] || 'https://via.placeholder.com/40'}">
                    <div class="message-content">
                        <div style="font-weight: 600;">${req.from_user?.name || '匿名用户'} (${req.from_user?.phone})</div>
                        <div style="color: #888; margin-top: 5px;">${req.message || '希望与您联系'}</div>
                        <div class="message-time">${new Date(req.created_at).toLocaleString()}</div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary btn-small" onclick="handleRequest('${req.id}', 'accepted')">接受</button>
                        <button class="btn btn-danger btn-small" onclick="handleRequest('${req.id}', 'rejected')">拒绝</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function handleRequest(requestId, status) {
            const supabase = getSupabase();
            
            const { error } = await supabase
                .from('agency_requests')
                .update({ status: status })
                .eq('id', requestId);
            
            if (error) {
                showAlert('操作失败', 'error');
            } else {
                showAlert(status === 'accepted' ? '已接受' : '已拒绝', 'success');
                loadRequests();
            }
        }
        
        function initCheckboxEvents() {
            document.querySelectorAll('.checkbox-item').forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            item.classList.add('selected');
                        } else {
                            item.classList.remove('selected');
                        }
                    });
                    
                    if (checkbox.checked) {
                        item.classList.add('selected');
                    }
                }
            });
        }
        
        initCheckboxEvents();
        initProvinceSelect();
        
        const passwordInput = document.getElementById('clientPassword');
        if (passwordInput) {
            passwordInput.value = generatePassword();
        }
        
        loadClients();
        loadRequests();
    }
</script>
</body>

    <!-- 全局函数定义 - 必须在最前面 -->
    <script>
        // 全局函数定义
        function showTab(tabName) {
            console.log('切换到标签:', tabName);
            
            // 更新导航栏状态
            document.querySelectorAll('.navbar-nav a').forEach(a => a.classList.remove('active'));
            const navLink = document.getElementById('nav' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if (navLink) navLink.classList.add('active');
            
            // 更新标签按钮状态
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tabBtn = document.querySelector(`[data-tab="${tabName}"]`);
            if (tabBtn) tabBtn.classList.add('active');
            
            // 显示对应内容
            document.querySelectorAll('.tab-content').forEach(c => {
                c.classList.add('hidden');
                c.classList.remove('active');
            });
            
            const tabContent = document.getElementById(tabName + 'Tab');
            if (tabContent) {
                tabContent.classList.remove('hidden');
                tabContent.classList.add('active');
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            if (alertBox) {
                alertBox.className = `alert alert-${type}`;
                alertBox.textContent = message;
                alertBox.classList.remove('hidden');
                
                setTimeout(() => {
                    alertBox.classList.add('hidden');
                }, 3000);
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('clientDetailModal');
            if (modal) modal.classList.add('hidden');
        }
        
        function generatePassword() {
            return Math.random().toString(36).substring(2, 8);
        }
    </script>

        // 照片处理函数
        function handlePhotoSelect(input) {
            const preview = document.getElementById('photoPreview');
            const files = input.files;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const photoData = e.target.result;
                    selectedPhotos.push(photoData);

                    const imgContainer = document.createElement('div');
                    imgContainer.style.cssText = 'position: relative; width: 80px; height: 80px;';

                    const img = document.createElement('img');
                    img.src = photoData;
                    img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; border-radius: 8px;';

                    const removeBtn = document.createElement('button');
                    removeBtn.innerHTML = '×';
                    removeBtn.style.cssText = 'position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; border-radius: 50%; background: #e74c3c; color: white; border: none; cursor: pointer; font-size: 14px; line-height: 1;';
                    removeBtn.onclick = function() {
                        const index = selectedPhotos.indexOf(photoData);
                        if (index > -1) selectedPhotos.splice(index, 1);
                        imgContainer.remove();
                    };

                    imgContainer.appendChild(img);
                    imgContainer.appendChild(removeBtn);
                    preview.appendChild(imgContainer);
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }

        function clearPhotos() {
            selectedPhotos = [];
            document.getElementById('photoPreview').innerHTML = '';

        // 加载联系请求
        async function loadRequests() {

                if (requestList) requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：Supabase 库未加载，请刷新页面</p>';
                return;

                if (requestList) requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：Supabase 客户端未初始化</p>';

                const { data: requests, error } = await supabase
                    .from('agency_requests')
                    .select('*, from_user:users!agency_requests_from_user_id_fkey(id, name, phone, photos)')

                    .eq('status', 'pending')

                    requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">加载失败: ' + error.message + '</p>';

                if (!requests || requests.length === 0) {

                    <div class="message-item">

                            <div style="font-weight: 600;">${req.from_user?.name || '匿名用户'} (${req.from_user?.phone})</div>

            }
        }

        // 处理联系请求

                .from('agency_requests')
                .update({ status: status })
                .eq('id', requestId);
            
            if (error) {
                showAlert('操作失败', 'error');

                showAlert(status === 'accepted' ? '已接受' : '已拒绝', 'success');
                loadRequests();

        // 添加客户
        async function addClient(event) {
            event.preventDefault();
            
            const phone = document.getElementById('clientPhone').value.trim();
            const password = document.getElementById('clientPassword').value.trim();
            const name = document.getElementById('clientName').value.trim();
            const gender = document.getElementById('clientGender').value;
            const birthday = document.getElementById('clientBirthday').value;
            const height = document.getElementById('clientHeight').value;
            const currentAddress = document.getElementById('clientCurrentAddress').value.trim();
            const hukou = document.getElementById('clientHukou').value.trim();
            const maritalStatus = document.getElementById('clientMaritalStatus').value;
            
            if (!phone || !password || !name || !gender || !birthday || !height || !currentAddress || !hukou || !maritalStatus) {
                showAlert('请填写所有必填项', 'error');
                return;
            }
            
            if (phone.length !== 11) {
                showAlert('手机号必须是11位', 'error');
                return;
            }
            
            const supabase = getSupabase();
            
            // 检查手机号是否已存在
            const { data: existingUser } = await supabase
                .from('users')
                .select('id')
                .eq('phone', phone)
                .single();
            
            if (existingUser) {
                showAlert('该手机号已注册', 'error');
                return;
            }
            
            const userData = {
                phone: phone,
                password: password,
                name: name,
                gender: gender,
                birthday: birthday,
                height: parseInt(height),
                current_address: currentAddress,
                hukou: hukou,
                marital_status: maritalStatus,
                weight: document.getElementById('clientWeight').value ? parseInt(document.getElementById('clientWeight').value) : null,
                education: document.getElementById('clientEducation').value,
                occupation: document.getElementById('clientOccupation').value,
                income: document.getElementById('clientIncome').value,
                property: document.getElementById('clientProperty').value,
                car: document.getElementById('clientCar').value,
                smoking: document.getElementById('clientSmoking').value,
                drinking: document.getElementById('clientDrinking').value,
                religion: document.getElementById('clientReligion').value,
                wechat: document.getElementById('clientWechat').value,
                accept_pet: document.getElementById('clientAcceptPet').value,
                schedule: document.getElementById('clientSchedule').value,
                interests: getCheckboxValues('clientInterests'),
                activity_types: getCheckboxValues('clientActivityTypes'),
                finance_view: document.getElementById('clientFinanceView').value,
                live_with_parents: document.getElementById('clientLiveWithParents').value,
                expected_children: document.getElementById('clientExpectedChildren').value,
                self_description: document.getElementById('clientSelfDescription').value,
                declaration: document.getElementById('clientDeclaration').value,
                agency_id: currentUser.id,
                photos: selectedPhotos,
                status: 'active'
            };
            
            const { error } = await supabase
                .from('users')
                .insert([userData]);
            
            if (error) {
                console.error('录入失败:', error);
                showAlert('录入失败: ' + error.message, 'error');
            } else {
                showAlert('录入成功', 'success');
                clearClientForm();
                showTab('clients');
                loadClients();
            }
        }

            document.getElementById('clientPhone').value = '';

            document.getElementById('clientGender').value = '';
            document.getElementById('clientBirthday').value = '';
            document.getElementById('clientHeight').value = '';
            document.getElementById('clientCurrentAddress').value = '';
            document.getElementById('clientHukou').value = '';
            document.getElementById('clientMaritalStatus').value = '';
            document.getElementById('clientWeight').value = '';
            document.getElementById('clientEducation').value = '';
            document.getElementById('clientOccupation').value = '';
            document.getElementById('clientIncome').value = '';
            document.getElementById('clientProperty').value = '';
            document.getElementById('clientCar').value = '';
            document.getElementById('clientSmoking').value = '';
            document.getElementById('clientDrinking').value = '';
            document.getElementById('clientReligion').value = '';
            document.getElementById('clientWechat').value = '';
            document.getElementById('clientAcceptPet').value = '';
            document.getElementById('clientSchedule').value = '';
            document.getElementById('clientFinanceView').value = '';
            document.getElementById('clientLiveWithParents').value = '';
            document.getElementById('clientExpectedChildren').value = '';
            document.getElementById('clientSelfDescription').value = '';
            document.getElementById('clientDeclaration').value = '';

            selectedPhotos = [];
            document.getElementById('photoPreview').innerHTML = '';

            document.querySelectorAll('#addTab input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('#addTab .checkbox-item').forEach(item => item.classList.remove('selected'));

            document.getElementById('clientPassword').value = generatePassword();
        }

        // 初始化复选框事件
        function initCheckboxEvents() {
            document.querySelectorAll('.checkbox-item').forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            item.classList.add('selected');
                        } else {
                            item.classList.remove('selected');
                        }
                    });

                    if (checkbox.checked) {
                        item.classList.add('selected');
                    }
                }
            });
        }

        // 标签按钮点击事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                showTab(tabName);
            });
        });

        // 页面初始化
        async function init() {
            console.log('========== 开始初始化 ==========');
            
            initCheckboxEvents();
            document.getElementById('clientPassword').value = generatePassword();

            // 等待 Supabase 加载
            console.log('⌛ 等待 Supabase 库加载...');
            let waitCount = 0;
            while (typeof window.supabase === 'undefined' && waitCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                waitCount++;
            }

            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase 库加载超时');
                document.getElementById('clientList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：数据库连接超时，请刷新页面</p>';
                document.getElementById('requestList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：数据库连接超时，请刷新页面</p>';
                return;
            }
            console.log('✅ Supabase 库已加载');

            try {
                getSupabase();
                console.log('✅ Supabase 客户端已初始化');
            } catch (e) {
                console.error('❌ Supabase 客户端初始化失败:', e);
                document.getElementById('clientList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：' + e.message + '</p>';
                document.getElementById('requestList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：' + e.message + '</p>';
                return;
            }

            console.log('📥 开始加载数据...');
            await loadClients();
            await loadRequests();
            console.log('========== 初始化完成 ==========');
        }

        // 启动初始化
        init();
    </script>

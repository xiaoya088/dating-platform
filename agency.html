<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 中介后台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        @media print {
            body { background: white; }
            .navbar, .tabs, .search-box, .card-header, .btn, .no-print { display: none !important; }
            .container { padding: 0; max-width: 100%; }
            .card { box-shadow: none; border: none; padding: 0; margin: 0; }
            .modal { position: static; background: none; display: block !important; }
            .modal-content { width: 100%; max-width: 100%; max-height: none; overflow: visible; box-shadow: none; border: none; padding: 0; }
            .modal-header { display: none; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 15px; }
            .print-table { width: 100%; border-collapse: collapse; font-size: 11pt; }
            .print-table th, .print-table td { border: 1px solid #333; padding: 8px 12px; text-align: left; vertical-align: top; }
            .print-table th { background: #f0f0f0 !important; font-weight: bold; width: 30%; }
            .print-section-title { background: #e8e8e8; font-weight: bold; font-size: 12pt; padding: 10px; margin-top: 20px; border: 1px solid #333; page-break-before: always; }
            .print-footer { display: block !important; margin-top: 30px; text-align: right; font-size: 10pt; color: #666; border-top: 1px solid #333; padding-top: 10px; }
            .print-only-requirements .print-header { display: none !important; }
            .print-only-requirements .print-table:first-of-type { display: none !important; }
            .print-only-requirements .print-section-title { margin-top: 0; page-break-before: avoid; }
            .print-only-requirements .print-footer { display: none !important; }
            .print-photos-row img { max-width: 180px; max-height: 220px; margin: 10px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid #ddd; }
            .print-photos-row { text-align: center; padding: 15px !important; }
        }
        .print-header { display: none; }
        .print-footer { display: none; }
        .print-section-title { display: none; }
        .print-only-requirements .print-section-title { display: block !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">💕 中介后台</div>
        <ul class="navbar-nav">
            <li><a href="#" onclick="showTab('clients'); return false;" class="active" id="navClients">客户管理</a></li>
            <li><a href="#" onclick="showTab('matches'); return false;" id="navMatches">匹配信息</a></li>
            <li><a href="#" onclick="showTab('requests'); return false;">联系请求</a></li>
            <li><a href="#" onclick="logout(); return false;">退出</a></li>
        </ul>
    </nav>

    <!-- 全局函数定义 - 必须在最前面 -->
    <script>
        // 全局函数定义
        function showTab(tabName) {
            console.log('切换到标签:', tabName);
            
            // 更新导航栏状态
            document.querySelectorAll('.navbar-nav a').forEach(a => a.classList.remove('active'));
            const navLink = document.getElementById('nav' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
            if (navLink) navLink.classList.add('active');
            
            // 更新标签按钮状态
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tabBtn = document.querySelector(`[data-tab="${tabName}"]`);
            if (tabBtn) tabBtn.classList.add('active');
            
            // 显示对应内容
            document.querySelectorAll('.tab-content').forEach(c => {
                c.classList.add('hidden');
                c.classList.remove('active');
            });
            
            const tabContent = document.getElementById(tabName + 'Tab');
            if (tabContent) {
                tabContent.classList.remove('hidden');
                tabContent.classList.add('active');
            }
            
            // 根据标签加载数据
            if (tabName === 'matches') {
                backToMatchList();
                loadAgencyMatches();
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            if (alertBox) {
                alertBox.className = `alert alert-${type}`;
                alertBox.textContent = message;
                alertBox.classList.remove('hidden');
                
                setTimeout(() => {
                    alertBox.classList.add('hidden');
                }, 3000);
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('clientDetailModal');
            if (modal) modal.classList.add('hidden');
        }

        function printRequirementsOnly() {
            const modalContent = document.querySelector('.modal-content');
            if (modalContent) {
                modalContent.classList.add('print-only-requirements');
                window.print();
                setTimeout(() => {
                    modalContent.classList.remove('print-only-requirements');
                }, 100);
            }
        }

        function closeEditModal() {
            const modal = document.getElementById('clientEditModal');
            if (modal) modal.classList.add('hidden');
        }

        function generatePassword() {
            return Math.random().toString(36).substring(2, 8);
        }
    </script>

        console.log('========== 中介后台加载 ==========');
        
        // 用户信息
        let currentUser = null;
        let selectedPhotos = []; // 存储选中的照片

        const urlParams = new URLSearchParams(window.location.search);
        const encodedUser = urlParams.get('user');

        if (encodedUser) {
            try {
                const userDataStr = decodeURIComponent(encodedUser);
                currentUser = JSON.parse(userDataStr);
                sessionStorage.setItem('currentUser', userDataStr);
            } catch (e) {
                currentUser = getCurrentUser();
            }
        } else {
            currentUser = getCurrentUser();
        }

        if (!currentUser || currentUser.role !== 'agency') {
            window.location.href = 'index.html';
            throw new Error('未登录'); // 阻止后续代码执行
        }
        
        console.log('✅ 用户登录状态:', currentUser);

        // 照片处理函数
        function handlePhotoSelect(input) {
            const preview = document.getElementById('photoPreview');
            const files = input.files;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const photoData = e.target.result;
                    selectedPhotos.push(photoData);

                    const imgContainer = document.createElement('div');
                    imgContainer.style.cssText = 'position: relative; width: 80px; height: 80px;';

                    const img = document.createElement('img');
                    img.src = photoData;
                    img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; border-radius: 8px;';

                    const removeBtn = document.createElement('button');
                    removeBtn.innerHTML = '×';
                    removeBtn.style.cssText = 'position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; border-radius: 50%; background: #e74c3c; color: white; border: none; cursor: pointer; font-size: 14px; line-height: 1;';
                    removeBtn.onclick = function() {
                        const index = selectedPhotos.indexOf(photoData);
                        if (index > -1) selectedPhotos.splice(index, 1);
                        imgContainer.remove();
                    };

                    imgContainer.appendChild(img);
                    imgContainer.appendChild(removeBtn);
                    preview.appendChild(imgContainer);
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }

        function clearPhotos() {
            selectedPhotos = [];
            document.getElementById('photoPreview').innerHTML = '';
        }

        function getCheckboxValues(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return [];
            const checkboxes = container.querySelectorAll('input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function setCheckboxValues(containerId, values) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const checkboxes = container.querySelectorAll('input[type="checkbox"]');
            const valueArray = Array.isArray(values) ? values : (values ? values.split(',') : []);
            checkboxes.forEach(cb => {
                cb.checked = valueArray.includes(cb.value);
            });
        }

        function getImportanceLabel(importance) {
            const labels = {
                'must': '必须满足',
                'very_important': '非常重要',
                'normal': '一般',
                'optional': '可有可无'
            };
            return labels[importance] || importance || '';

        // 切换客户状态
        async function toggleClientStatus(clientId, currentStatus) {
            const supabase = getSupabase();
            
            const newStatus = currentStatus === 'active' ? 'disabled' : 'active';
            
            const { error } = await supabase
                .from('users')
                .update({ status: newStatus })
                .eq('id', clientId);
            
            if (error) {
                showAlert('操作失败', 'error');
            } else {
                showAlert(newStatus === 'active' ? '已启用' : '已禁用', 'success');
                loadClients();
            }
        }

        // 重置密码
        async function resetPassword(clientId) {
            const newPassword = generatePassword();
            const supabase = getSupabase();

            const { error } = await supabase
                .from('users')
                .update({ password: newPassword })
                .eq('id', clientId);

            if (error) {
                showAlert('重置失败', 'error');
            } else {
                showAlert(`密码已重置为: ${newPassword}`, 'success');

                showTab('add');
                
                setTimeout(() => {
                    const passwordInput = document.getElementById('clientPassword');
                    if (passwordInput) {
                        passwordInput.value = newPassword;
                        passwordInput.focus();
                        passwordInput.select();
                    }
                }, 100);
            }
        }

                income_importance: document.getElementById('clientIncomeImportance').value,
                house_required: document.getElementById('clientReqProperty').value,
                car_required: document.getElementById('clientReqCar').value,
                smoking: document.getElementById('clientReqSmoking').value,
                drinking: document.getElementById('clientReqDrinking').value
            };

            if (selectedPhotos.length > 0) {
                formData.photos = selectedPhotos;
            }

            if (editClientId) {
                // 编辑模式 - 更新 users 表
                console.log('编辑模式，editClientId:', editClientId);
                console.log('formData:', formData);
                
                const { error: userError } = await supabase
                    .from('users')
                    .update(formData)
                    .eq('id', editClientId);

                if (userError) {
                    showAlert('保存失败: ' + userError.message, 'error');
                    return;
                }

                // 更新 user_requirements 表
                const { data: existingReq, error: reqCheckError } = await supabase
                    .from('user_requirements')
                    .select('id')
                    .eq('user_id', editClientId)
                    .maybeSingle();

                if (reqCheckError) {
                    showAlert('保存失败: ' + reqCheckError.message, 'error');
                    return;
                }

                if (existingReq) {
                    const { error: reqError } = await supabase
                        .from('user_requirements')
                        .update(requirementsData)
                        .eq('user_id', editClientId);
                    if (reqError) {
                        showAlert('保存失败: ' + reqError.message, 'error');
                        return;
                    }
                } else {
                    requirementsData.user_id = editClientId;
                    const { error: reqError } = await supabase
                        .from('user_requirements')
                        .insert([requirementsData]);
                    if (reqError) {
                        showAlert('保存失败: ' + reqError.message, 'error');
                        return;
                    }
                }

                showAlert('保存成功', 'success');
                cancelEdit();
                showAllClientsForManage();
            } else {
                // 新增模式
                console.log('新增模式');
                console.log('formData:', formData);
                console.log('currentUser:', currentUser);
                
                if (!formData.phone || !formData.name) {
                    showAlert('请填写必填项', 'error');
                    return;
                }

                formData.agency_id = currentUser.id;
                formData.status = 'active';
                console.log('准备插入用户数据');

                const { data: newUser, error: userError } = await supabase
                    .from('users')
                    .insert([formData])
                    .select()
                    .single();
                
                console.log('用户插入结果:', newUser, userError);

                if (userError) {
                    showAlert('录入失败: ' + userError.message, 'error');
                    return;
                }

                // 插入 user_requirements 表
                requirementsData.user_id = newUser.id;
                const { error: reqError } = await supabase
                    .from('user_requirements')
                    .insert([requirementsData]);

                if (reqError) {
                    showAlert('录入失败: ' + reqError.message, 'error');
                    return;
                }

                showAlert('录入成功', 'success');
                document.getElementById('clientForm').reset();
                selectedPhotos = [];
            }
        }

        // 搜索客户用于管理
        async function searchClientForManage() {
            const keyword = document.getElementById('manageClientPhone').value.trim();

            if (!keyword) {
                showAlert('请输入手机号', 'error');
                return;
            }

            const supabase = getSupabase();
            if (!supabase) {
                showAlert('数据库未连接', 'error');
                return;
            }

            const { data: clients, error } = await supabase
                .from('users')
                .select('*')
                .eq('agency_id', currentUser.id)
                .eq('phone', keyword);

            if (error) {
                showAlert('搜索失败', 'error');
                return;
            }

            displayManageClientResult(clients);
        }

        // 加载联系请求
        async function loadRequests() {
            console.log('📥 开始加载联系请求...');
            
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase 库未加载');
                const requestList = document.getElementById('requestList');
                if (requestList) requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：Supabase 库未加载，请刷新页面</p>';
                return;
            }

            const supabase = getSupabase();
            if (!supabase) {
                console.error('❌ Supabase 客户端未初始化');
                const requestList = document.getElementById('requestList');
                if (requestList) requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：Supabase 客户端未初始化</p>';
                return;
            }

            if (!currentUser || !currentUser.id) {
                console.error('❌ 用户信息未初始化');
                const requestList = document.getElementById('requestList');
                if (requestList) requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：用户信息丢失，请重新登录</p>';
                return;
            }

            console.log('🔍 查询 agency_id:', currentUser.id);

            try {
                const { data: requests, error } = await supabase
                    .from('agency_requests')
                    .select('*, from_user:users!agency_requests_from_user_id_fkey(id, name, phone, photos)')
                    .eq('agency_id', currentUser.id)
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                console.log('📊 查询结果:', { 成功: !!requests, 数量: requests?.length, 错误: error });

                const requestList = document.getElementById('requestList');
                if (!requestList) return;

                if (error) {
                    console.error('❌ 查询失败:', error);
                    requestList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">加载失败: ' + error.message + '</p>';
                    return;
                }

                if (!requests || requests.length === 0) {
                    requestList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">暂无联系请求</p>';
                    return;
                }

                requestList.innerHTML = requests.map(req => {
                    const statusBadge = req.status === 'accepted' ? '<span style="background: #27ae60; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">已接受</span>' :
                                        req.status === 'rejected' ? '<span style="background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">已拒绝</span>' :
                                        '<span style="background: #f39c12; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">待处理</span>';
                    return `
                    <div class="message-item" style="cursor: pointer;" onclick="openRequestDetail('${req.id}')">

        // 处理联系请求
        async function handleRequest(requestId, status) {
            const supabase = getSupabase();
            
            const { error } = await supabase
                .from('agency_requests')
                .update({ status: status })
                .eq('id', requestId);
            
            if (error) {
                showAlert('操作失败', 'error');

                loadRequests();
            }
        }

        // 获取用户照片
        // 照片缓存，避免重复解析
        const photoCache = new Map();
        
        // 默认头像SVG
        const defaultAvatarSVG = 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2740%27 height=%2740%27 viewBox=%270 0 40 40%27%3E%3Crect fill=%27%23ddd%27 width=%2740%27 height=%2740%27/%3E%3Ctext x=%2720%27 y=%2722%27 font-size=%2710%27 text-anchor=%27middle%27 fill=%27%23666%27%3E%3C/text%3E%3C/svg%3E';
        
        function getAgencyUserPhoto(user, useCache = true) {
            if (!user) return defaultAvatarSVG;
            
            const cacheKey = user.id;
            if (useCache && photoCache.has(cacheKey)) {
                return photoCache.get(cacheKey);
            }
            
            let photos = user.photos;
            if (typeof photos === 'string') {
                try {
                    photos = JSON.parse(photos);
                } catch (e) {
                    photos = [];
                }
            }
            
            let result = defaultAvatarSVG;
            
            if (Array.isArray(photos) && photos.length > 0) {
                result = photos[0];
            }
            
            if (useCache) {
                photoCache.set(cacheKey, result);
            }
            return result;
        }
        
        // 创建带懒加载的头像元素
        function createLazyAvatar(user, size = 40) {
            const photoUrl = getAgencyUserPhoto(user);
            const isDataUrl = photoUrl.startsWith('data:');
            
            if (isDataUrl) {
                // base64图片直接使用
                return `<img class="message-avatar" src="${photoUrl}" loading="lazy" style="width:${size}px;height:${size}px;" onerror="this.src='${defaultAvatarSVG}'">`;
            } else {
                // 外部URL使用懒加载
                return `<img class="message-avatar" src="${photoUrl}" loading="lazy" style="width:${size}px;height:${size}px;" onerror="this.src='${defaultAvatarSVG}'">`;
            }
        }
        
        // 清除照片缓存
        function clearPhotoCache() {
            photoCache.clear();

        // 加载请求相关的聊天消息
        async function loadRequestChatMessages(userId) {
            const supabase = getSupabase();
            const chatMessages = document.getElementById('requestChatMessages');
            
            if (!userId) {
                chatMessages.innerHTML = '<p style="text-align: center; color: #888;">无法加载消息</p>';
                return;
            }
            
            try {
                // 获取发送和接收的消息
                const { data: sentMessages, error: sentError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentUser.id)
                    .eq('to_user_id', userId)
                    .order('created_at', { ascending: true });
                
                if (sentError) console.error('加载已发送消息失败:', sentError);
                
                const { data: receivedMessages, error: receivedError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', userId)
                    .eq('to_user_id', currentUser.id)
                    .order('created_at', { ascending: true });
                
                if (receivedError) console.error('加载接收消息失败:', receivedError);
                
                const messages = [...(sentMessages || []), ...(receivedMessages || [])];
                messages.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.createdAt || 0);
                    const dateB = new Date(b.created_at || b.createdAt || 0);
                    return dateA - dateB;
                });
                
                if (!messages || messages.length === 0) {
                    chatMessages.innerHTML = '<p style="text-align: center; color: #888;">暂无私信记录</p>';
                    return;
                }
                
                const otherName = currentRequestDetail?.from_user?.name || '用户';
                
                chatMessages.innerHTML = messages.map(m => {
                    const isMine = m.from_user_id === currentUser.id;
                    const messageContent = m.content ? m.content : (m.image_url ? `<img src="${m.image_url}" style="max-width: 100%; cursor: pointer;">` : '[空消息]');
                    const displayTime = new Date(m.created_at).toLocaleTimeString();
                    
                    return `
                        <div style="display: flex; flex-direction: ${isMine ? 'row-reverse' : 'row'}; margin-bottom: 12px; align-items: flex-start;">

                                <div>${messageContent}</div>
                                <div style="font-size: 11px; color: ${isMine ? 'rgba(255,255,255,0.7)' : '#999'}; margin-top: 4px;">${displayTime}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // 滚动到底部

                // 标记消息为已读
                await supabase
                    .from('messages')
                    .update({ is_read: true })
                    .eq('from_user_id', userId)
                    .eq('to_user_id', currentUser.id)
                    .eq('is_read', false);
                
            } catch (e) {

                chatMessages.innerHTML = '<p style="text-align: center; color: #e74c3c;">加载失败: ' + e.message + '</p>';

                                    ${target.gender || '-'} | ${age}岁 | ${target.height || '-'}cm | ${target.education || '-'}
                                </div>
                                <div style="color: #888; font-size: 12px; margin-top: 4px;">
                                    ${target.phone || '无电话'} | ${target.family_hometown || '未知地区'}
                                </div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 24px; font-weight: 600; color: ${score >= 80 ? '#27ae60' : score >= 60 ? '#667eea' : '#f39c12'};">${score}</div>
                                <div style="font-size: 12px; color: #888;">匹配度</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                console.error('❌ 加载匹配结果失败:', e);
                resultsList.innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">加载异常: ' + e.message + '</p>';
            }
        }

        // 添加客户
        async function addClient(event) {
            event.preventDefault();
            
            const phone = document.getElementById('clientPhone').value.trim();
            const password = document.getElementById('clientPassword').value.trim();
            const name = document.getElementById('clientName').value.trim();
            const gender = document.getElementById('clientGender').value;
            const birthday = document.getElementById('clientBirthday').value;
            const height = document.getElementById('clientHeight').value;
            const currentAddress = document.getElementById('clientCurrentAddress').value.trim();
            const hukou = document.getElementById('clientHukou').value.trim();
            const maritalStatus = document.getElementById('clientMaritalStatus').value;
            
            if (!phone || !password || !name || !gender || !birthday || !height || !currentAddress || !hukou || !maritalStatus) {
                showAlert('请填写所有必填项', 'error');
                return;
            }
            
            if (phone.length !== 11) {
                showAlert('手机号必须是11位', 'error');
                return;
            }
            
            const supabase = getSupabase();
            
            // 检查手机号是否已存在
            const { data: existingUser } = await supabase
                .from('users')
                .select('id')
                .eq('phone', phone)
                .single();
            
            if (existingUser) {
                showAlert('该手机号已注册', 'error');
                return;
            }
            
            const userData = {
                phone: phone,
                password: password,
                name: name,
                gender: gender,
                birthday: birthday,
                height: parseInt(height),
                current_address: currentAddress,
                hukou: hukou,
                marital_status: maritalStatus,
                weight: document.getElementById('clientWeight').value ? parseInt(document.getElementById('clientWeight').value) : null,
                education: document.getElementById('clientEducation').value,
                occupation: document.getElementById('clientOccupation').value,
                income: document.getElementById('clientIncome').value,
                property: document.getElementById('clientProperty').value,
                car: document.getElementById('clientCar').value,
                smoking: document.getElementById('clientSmoking').value,
                drinking: document.getElementById('clientDrinking').value,
                religion: document.getElementById('clientReligion').value,
                wechat: document.getElementById('clientWechat').value,
                accept_pet: document.getElementById('clientAcceptPet').value,
                schedule: document.getElementById('clientSchedule').value,
                interests: getCheckboxValues('clientInterests'),
                activity_types: getCheckboxValues('clientActivityTypes'),
                finance_view: document.getElementById('clientFinanceView').value,
                live_with_parents: document.getElementById('clientLiveWithParents').value,
                expected_children: document.getElementById('clientExpectedChildren').value,
                self_description: document.getElementById('clientSelfDescription').value,
                declaration: document.getElementById('clientDeclaration').value,
                agency_id: currentUser.id,
                photos: selectedPhotos,
                status: 'active'
            };
            
            const { error } = await supabase
                .from('users')
                .insert([userData]);
            
            if (error) {
                console.error('录入失败:', error);
                showAlert('录入失败: ' + error.message, 'error');
            } else {
                showAlert('录入成功', 'success');
                clearClientForm();
                showTab('clients');
                loadClients();
            }
        }

        // 清空表单
        function clearClientForm() {
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientPassword').value = '';
            document.getElementById('clientName').value = '';
            document.getElementById('clientGender').value = '';
            document.getElementById('clientBirthday').value = '';
            document.getElementById('clientHeight').value = '';
            document.getElementById('clientCurrentAddress').value = '';
            document.getElementById('clientHukou').value = '';
            document.getElementById('clientMaritalStatus').value = '';
            document.getElementById('clientWeight').value = '';
            document.getElementById('clientEducation').value = '';
            document.getElementById('clientOccupation').value = '';
            document.getElementById('clientIncome').value = '';
            document.getElementById('clientProperty').value = '';
            document.getElementById('clientCar').value = '';
            document.getElementById('clientSmoking').value = '';
            document.getElementById('clientDrinking').value = '';
            document.getElementById('clientReligion').value = '';
            document.getElementById('clientWechat').value = '';
            document.getElementById('clientAcceptPet').value = '';
            document.getElementById('clientSchedule').value = '';
            document.getElementById('clientFinanceView').value = '';
            document.getElementById('clientLiveWithParents').value = '';
            document.getElementById('clientExpectedChildren').value = '';
            document.getElementById('clientSelfDescription').value = '';
            document.getElementById('clientDeclaration').value = '';

            selectedPhotos = [];
            document.getElementById('photoPreview').innerHTML = '';

            document.querySelectorAll('#addTab input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('#addTab .checkbox-item').forEach(item => item.classList.remove('selected'));

            document.getElementById('clientPassword').value = generatePassword();
        }

        // 初始化复选框事件
        function initCheckboxEvents() {
            document.querySelectorAll('.checkbox-item').forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            item.classList.add('selected');
                        } else {
                            item.classList.remove('selected');
                        }
                    });

                    if (checkbox.checked) {
                        item.classList.add('selected');
                    }
                }
            });
        }

        // 标签按钮点击事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                showTab(tabName);
            });
        });

        // 页面初始化
        async function init() {
            console.log('========== 开始初始化 ==========');
            
            initCheckboxEvents();
            document.getElementById('clientPassword').value = generatePassword();

            // 等待 Supabase 加载
            console.log('⌛ 等待 Supabase 库加载...');
            let waitCount = 0;
            while (typeof window.supabase === 'undefined' && waitCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                waitCount++;
            }

            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase 库加载超时');
                document.getElementById('clientList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：数据库连接超时，请刷新页面</p>';
                document.getElementById('requestList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：数据库连接超时，请刷新页面</p>';
                return;
            }
            console.log('✅ Supabase 库已加载');

            try {
                getSupabase();
                console.log('✅ Supabase 客户端已初始化');
            } catch (e) {
                console.error('❌ Supabase 客户端初始化失败:', e);
                document.getElementById('clientList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：' + e.message + '</p>';
                document.getElementById('requestList').innerHTML = '<p style="text-align: center; color: #f00; padding: 40px;">错误：' + e.message + '</p>';
                return;
            }

            console.log('📥 开始加载数据...');
            await loadClients();
            await loadRequests();
            await loadAgencyMatches(); // 预加载匹配信息
            console.log('========== 初始化完成 ==========');
        }

        // 启动初始化
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>婚恋红娘系统 - 扫码注册</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        
        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .app-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .app-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .app-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .qr-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 340px;
            width: 100%;
        }
        
        .qr-code-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
        }
        
        .qr-code {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: 4px solid #f0f0f0;
        }
        
        .qr-center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #667eea;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .qr-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .qr-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .qr-tips {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }
        
        .qr-tips .tip-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #666;
        }
        
        .qr-tips .tip-item:last-child {
            margin-bottom: 0;
        }
        
        .tip-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .app-footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }
        
        .refresh-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .url-display {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            word-break: break-all;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="app-logo">💕</div>
            <div class="app-title">婚恋红娘系统</div>
            <div class="app-subtitle">扫码注册 · 开启缘分之旅</div>
        </div>
        
        <div class="qr-card">
            <div class="qr-code-wrapper">
                <div class="qr-code" id="qrCode"></div>
                <div class="qr-center-icon">💕</div>
            </div>
            
            <div class="qr-title">扫码注册</div>
            <div class="qr-desc">使用微信或手机浏览器扫描二维码，快速注册成为会员</div>
            
            <div class="qr-tips">
                <div class="tip-item">
                    <span class="tip-icon">📱</span>
                    <span>打开微信扫一扫</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">🔍</span>
                    <span>扫描上方二维码</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">✅</span>
                    <span>填写信息完成注册</span>
                </div>
            </div>
            
            <button class="refresh-btn" onclick="refreshQrCode()">🔄 刷新二维码</button>
        </div>
        
        <div class="url-display" id="registerUrl"></div>
        
        <div class="app-footer">
            <p>婚恋红娘系统 © 2024</p>
            <p style="margin-top: 5px;">专业婚恋服务平台</p>
        </div>
    </div>

    <script>
        const registerUrl = `${window.location.origin}/register.html`;
        
        function renderQrCode() {
            QRCode.toCanvas(document.getElementById('qrCode'), registerUrl, {
                width: 200,
                color: {
                    dark: '#333',
                    light: '#fff'
                },
                margin: 2
            }, function (error) {
                if (error) console.error('生成二维码失败:', error);
            });
            
            document.getElementById('registerUrl').textContent = registerUrl;
        }
        
        function refreshQrCode() {
            renderQrCode();
        }
        
        window.onload = function() {
            renderQrCode();
            
            // 添加触摸设备优化
            if ('standalone' in window.navigator && window.navigator.standalone) {
                document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库配置 - 缘来是你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .config-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-test {
            background: linear-gradient(135deg, #2ed573 0%, #27ae60 100%);
            margin-top: 15px;
        }
        .btn-test:hover {
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.4);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }
        .nav-links {
            margin-top: 20px;
            text-align: center;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="config-container">
        <h1>⚙️ 数据库配置</h1>
        
        <div class="info-box">
            <strong>如何获取配置信息：</strong><br>
            1. 登录 <a href="https://supabase.com/dashboard" target="_blank">Supabase</a><br>
            2. 创建或选择项目<br>
            3. 进入 Settings → API<br>
            4. 复制 Project URL 和 anon public key
        </div>

        <form id="configForm">
            <div class="form-group">
                <label for="supabaseUrl">Supabase URL</label>
                <input type="url" id="supabaseUrl" placeholder="https://xxxxx.supabase.co" required>
            </div>
            
            <div class="form-group">
                <label for="supabaseKey">anon public key</label>
                <input type="text" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIs..." required>
            </div>
            
            <button type="button" class="btn btn-test" onclick="testConnection()">🔗 测试连接</button>
            <button type="submit" class="btn">💾 保存配置</button>
        </form>
        
        <div id="status" class="status"></div>
        
        <div class="nav-links">
            <a href="admin.html">管理后台</a>
            <a href="login.html">用户登录</a>
            <a href="index.html">首页</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 加载已保存的配置
        document.addEventListener('DOMContentLoaded', () => {
            const savedConfig = localStorage.getItem('supabaseConfig');
            if (savedConfig) {
                const config = JSON.parse(savedConfig);
                document.getElementById('supabaseUrl').value = config.url || '';
                document.getElementById('supabaseKey').value = config.anonKey || '';
            }
        });

        // 测试连接
        async function testConnection() {
            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;
            
            if (!url || !key) {
                showStatus('请先填写配置信息', 'error');
                return;
            }
            
            try {
                showStatus('正在测试连接...', 'success');
                
                const supabase = window.supabase.createClient(url, key);
                const { data, error } = await supabase.from('users').select('*').limit(1);
                
                if (error) {
                    if (error.message.includes('relation "users" does not exist')) {
                        showStatus('✅ 连接成功！但用户表尚未创建，请在 Supabase 中创建数据表', 'success');
                    } else {
                        showStatus('❌ 连接失败：' + error.message, 'error');
                    }
                } else {
                    showStatus('✅ 连接成功！数据库中有 ' + (data.length || 0) + ' 条用户记录', 'success');
                }
            } catch (error) {
                showStatus('❌ 连接失败：' + error.message, 'error');
            }
        }

        // 保存配置
        document.getElementById('configForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;
            
            const config = { url, anonKey: key };
            localStorage.setItem('supabaseConfig', JSON.stringify(config));
            
            showStatus('✅ 配置已保存！', 'success');
            
            // 延迟跳转
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        });

        // 显示状态
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>

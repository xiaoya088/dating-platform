<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 私信</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">💕 婚恋红娘系统 <span id="userNameDisplay" style="font-size: 14px; color: #888; font-weight: normal; margin-left: 10px;"></span></div>
        <ul class="navbar-nav">
            <li><a href="match.html">匹配推荐</a></li>
            <li><a href="messages.html" class="active">私信</a></li>
            <li><a href="announcements.html">公告</a></li>
            <li><a href="activities.html">线下活动</a></li>
            <li><a href="profile.html">个人资料</a></li>
            <li><a href="#" onclick="logout()">退出</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="card">
            <div class="card-header">私信</div>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="list">消息列表</button>
                <button class="tab-btn" data-tab="chat">聊天</button>
            </div>
            
            <div id="listTab" class="tab-content active">
                <div id="messageList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            
            <div id="chatTab" class="tab-content hidden">
                <div id="chatHeader" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <img id="chatAvatar" class="match-avatar" style="width: 45px; height: 45px;" src="">
                    <div style="flex: 1; min-width: 150px;">
                        <div id="chatName" style="font-weight: 600;"></div>
                        <div id="chatMeta" style="color: #888; font-size: 13px;"></div>
                    </div>
                    <button class="btn btn-secondary btn-small" onclick="backToList()">返回</button>
                </div>
                
                <div id="chatMessages" style="height: 50vh; max-height: 400px; min-height: 250px; overflow-y: auto; border: 1px solid #e1e5eb; border-radius: 8px; padding: 15px; background: #f8f9fa;"></div>
                
                <div style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="messageInput" placeholder="输入消息..." style="flex: 1; font-size: 16px; padding: 12px; min-height: 44px;">
                    <button class="btn btn-primary" onclick="sendChatMessage()" style="padding: 12px 20px; min-height: 44px;">发送</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="alertBox" class="hidden"></div>
    
    <script>
        const currentUser = getCurrentUser();
        console.log('messages.html currentUser:', currentUser);
        
        if (!currentUser) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userNameDisplay').textContent = `欢迎, ${currentUser.name || '用户'}`;
        }
        
        let currentChatUserId = null;
        let messagePollInterval = null;
        let lastMessageCheckTime = null;
        
        // 从sessionStorage获取目标聊天用户
        function getTargetChatUser() {
            const data = sessionStorage.getItem('targetChatUser');
            return data ? JSON.parse(data) : null;
        }
        
        // 设置目标聊天用户（供外部页面调用）
        function setTargetChatUser(userId, userName) {
            sessionStorage.setItem('targetChatUser', JSON.stringify({ id: userId, name: userName }));
        }
        
        async function init() {
            console.log('messages.html init started');
            try {
                await loadMessageList();
                console.log('messages.html loadMessageList completed');
                
                // 检查是否有目标聊天用户
                const targetUser = getTargetChatUser();
                if (targetUser && targetUser.id) {
                    await openChat(targetUser.id);
                    sessionStorage.removeItem('targetChatUser');
                    console.log('messages.html openChat completed');
                }
            } catch (error) {
                console.error('messages.html init error:', error);
                showAlert('初始化失败: ' + error.message, 'error');
            }
        }
        
        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    
                    this.classList.add('active');
                    document.getElementById(this.dataset.tab + 'Tab').classList.remove('hidden');
                });
            });
        }
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }
        
        // DOM 加载完成后执行初始化
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('DOM ready, starting init');
            setupTabs();
            await init();
            
            // 回车发送消息
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage();
                    }
                });
            }
        });
        
        function getUserPhotoUrl(user) {
            if (!user) return 'https://via.placeholder.com/40?text=无头像';
            let photos = user.photos;
            if (typeof photos === 'string') {
                try {
                    photos = JSON.parse(photos);
                } catch (e) {
                    photos = [];
                }
            }
            if (Array.isArray(photos) && photos.length > 0) {
                return photos[0];
            }
            return 'https://via.placeholder.com/40?text=无头像';
        }
        
        async function loadMessageList() {
            console.log('loadMessageList started');
            const supabase = getSupabase();
            const messageList = document.getElementById('messageList');
            
            messageList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const { data: sentMessages, error: sentError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (sentError) {
                    console.error('查询已发送消息失败:', sentError);
                }
                
                const { data: receivedMessages, error: receivedError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('to_user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (receivedError) {
                    console.error('查询接收消息失败:', receivedError);
                }
                
                const allMessages = [...(sentMessages || []), ...(receivedMessages || [])];
                const messages = allMessages.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.createdAt || 0);
                    const dateB = new Date(b.created_at || b.createdAt || 0);
                    return dateB - dateA;
                });
                
                console.log('loadMessageList messages count:', messages.length);
                
                if (!messages || messages.length === 0) {
                    messageList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">暂无私信记录</p>';
                    return;
                }
                
                const userIds = new Set();
                messages.forEach(m => {
                    if (m.from_user_id !== currentUser.id) userIds.add(m.from_user_id);
                    if (m.to_user_id !== currentUser.id) userIds.add(m.to_user_id);
                });
                
                const { data: users, error: usersError } = await supabase
                    .from('users')
                    .select('id, name, photos, province, city')
                    .in('id', Array.from(userIds));
                
                if (usersError) {
                    console.error('查询用户失败:', usersError);
                }
                
                const userMap = {};
                users?.forEach(u => userMap[u.id] = u);
                
                const conversations = {};
                messages.forEach(m => {
                    const otherId = m.from_user_id === currentUser.id ? m.to_user_id : m.from_user_id;
                    if (!conversations[otherId]) {
                        conversations[otherId] = {
                            user: userMap[otherId],
                            lastMessage: m,
                            unreadCount: 0
                        };
                    }
                    
                    if (m.to_user_id === currentUser.id && m.is_read === false) {
                        conversations[otherId].unreadCount++;
                    }
                });
                
                const convList = Object.values(conversations).sort((a, b) => {
                    const dateA = new Date(a.lastMessage.created_at || a.lastMessage.createdAt || 0);
                    const dateB = new Date(b.lastMessage.created_at || b.lastMessage.createdAt || 0);
                    return dateB - dateA;
                });
                
                messageList.innerHTML = convList.map(conv => {
                    const content = conv.lastMessage.content;
                    const displayContent = content ? content.substring(0, 50) : '[图片]';
                    return `
                        <div class="message-item" onclick="openChat('${conv.user?.id || conv.lastMessage.from_user_id}')">
                            <img class="message-avatar" src="${getUserPhotoUrl(conv.user)}">
                            <div class="message-content">
                                <div style="font-weight: 600;">${conv.user?.name || '匿名用户'}</div>
                                <div style="color: #888; font-size: 14px; margin-top: 5px;">${displayContent}${content && content.length > 50 ? '...' : ''}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="message-time">${formatTime(conv.lastMessage.created_at || conv.lastMessage.createdAt)}</div>
                                ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('loadMessageList exception:', e);
                messageList.innerHTML = `<p style="text-align: center; color: #e74c3c; padding: 40px;">加载消息列表失败: ${e.message}</p>`;
            }
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '未知时间';
            
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) return '未知时间';
            
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
            return date.toLocaleDateString('zh-CN');
        }
        
        async function openChat(userId) {
            console.log('openChat called with userId:', userId);
            
            if (!userId) {
                console.error('openChat: userId is null');
                showAlert('用户ID无效', 'error');
                return;
            }
            
            const supabase = getSupabase();
            currentChatUserId = userId;
            
            const { data: user, error: userError } = await supabase
                .from('users')
                .select('*')
                .eq('id', userId)
                .single();
            
            if (userError) {
                console.error('获取用户信息失败:', userError);
                showAlert('获取用户信息失败', 'error');
                return;
            }
            
            if (user) {
                document.getElementById('chatAvatar').src = getUserPhotoUrl(user);
                document.getElementById('chatName').textContent = user.name || '匿名用户';
                document.getElementById('chatMeta').textContent = `${user.province || ''} ${user.city || ''}`;
            }
            
            await loadChatMessages();
            
            console.log('openChat: switching tabs');
            
            const listTabBtn = document.querySelector('[data-tab="list"]');
            const chatTabBtn = document.querySelector('[data-tab="chat"]');
            const listTabContent = document.getElementById('listTab');
            const chatTabContent = document.getElementById('chatTab');
            
            console.log('listTabBtn:', listTabBtn);
            console.log('chatTabBtn:', chatTabBtn);
            console.log('listTabContent:', listTabContent);
            console.log('chatTabContent:', chatTabContent);
            
            if (listTabBtn) listTabBtn.classList.remove('active');
            if (chatTabBtn) chatTabBtn.classList.add('active');
            if (listTabContent) listTabContent.classList.add('hidden');
            if (chatTabContent) chatTabContent.classList.remove('hidden');
            
            console.log('openChat tabs switched');
            
            await supabase
                .from('messages')
                .update({ is_read: true })
                .eq('from_user_id', userId)
                .eq('to_user_id', currentUser.id)
                .eq('is_read', false);
            
            // 开始消息轮询
            startMessagePolling();
        }
        
        function startMessagePolling() {
            stopMessagePolling();
            lastMessageCheckTime = new Date();
            messagePollInterval = setInterval(async () => {
                if (currentChatUserId) {
                    await checkNewMessages();
                }
                await loadMessageList();
            }, 10000);
        }
        
        function stopMessagePolling() {
            if (messagePollInterval) {
                clearInterval(messagePollInterval);
                messagePollInterval = null;
            }
        }
        
        async function checkNewMessages() {
            if (!currentChatUserId || !lastMessageCheckTime) return;
            
            const supabase = getSupabase();
            const { data: newMessages } = await supabase
                .from('messages')
                .select('id, created_at')
                .eq('from_user_id', currentChatUserId)
                .eq('to_user_id', currentUser.id)
                .gt('created_at', lastMessageCheckTime.toISOString());
            
            if (newMessages && newMessages.length > 0) {
                await loadChatMessages();
                showAlert(`收到 ${newMessages.length} 条新消息`, 'success');
            }
            
            lastMessageCheckTime = new Date();
        }
        
        async function loadChatMessages() {
            console.log('loadChatMessages started, currentChatUserId:', currentChatUserId);
            const supabase = getSupabase();
            const chatMessages = document.getElementById('chatMessages');
            
            if (!currentChatUserId) {
                console.error('currentChatUserId is null, cannot load messages');
                chatMessages.innerHTML = '<p style="text-align: center; color: #888;">请选择聊天对象</p>';
                return;
            }
            
            try {
                const { data: sentMessages, error: sentError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentUser.id)
                    .eq('to_user_id', currentChatUserId);
                
                if (sentError) {
                    console.error('加载已发送消息失败:', sentError);
                }
                
                const { data: receivedMessages, error: receivedError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentChatUserId)
                    .eq('to_user_id', currentUser.id);
                
                if (receivedError) {
                    console.error('加载接收消息失败:', receivedError);
                }
                
                const messages = [...(sentMessages || []), ...(receivedMessages || [])];
                messages.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.createdAt || 0);
                    const dateB = new Date(b.created_at || b.createdAt || 0);
                    return dateA - dateB;
                });
                
                console.log('loadChatMessages messages count:', messages.length);
                
                if (!messages || messages.length === 0) {
                    chatMessages.innerHTML = '<p style="text-align: center; color: #888;">暂无消息，开始对话吧</p>';
                    return;
                }
                
                chatMessages.innerHTML = messages.map(m => {
                    const isMine = m.from_user_id === currentUser.id;
                    const messageContent = m.content ? m.content : (m.image_url ? `<img src="${m.image_url}" style="max-width: 100%;">` : '[空消息]');
                    return `
                        <div style="display: flex; justify-content: ${isMine ? 'flex-end' : 'flex-start'}; margin-bottom: 10px;">
                            <div style="max-width: 80%; padding: 10px 14px; border-radius: 12px; background: ${isMine ? '#667eea' : '#e1e5eb'}; color: ${isMine ? 'white' : '#333'}; word-wrap: break-word;">
                                ${messageContent}
                                <div style="font-size: 11px; color: ${isMine ? 'rgba(255,255,255,0.7)' : '#888'}; margin-top: 5px;">${formatTime(m.created_at || m.createdAt)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (e) {
                console.error('loadChatMessages exception:', e);
                chatMessages.innerHTML = `<p style="text-align: center; color: #e74c3c;">加载消息失败: ${e.message}</p>`;
            }
        }
        
        async function sendChatMessage() {
            console.log('sendChatMessage called');
            
            const content = document.getElementById('messageInput').value.trim();
            console.log('message content:', content);
            
            if (!content) {
                showAlert('请输入消息内容', 'error');
                return;
            }
            
            if (!currentChatUserId) {
                console.error('currentChatUserId is null');
                showAlert('请先选择聊天对象', 'error');
                return;
            }
            
            console.log('sending to:', currentChatUserId);
            
            const supabase = getSupabase();
            
            try {
                const { error } = await supabase
                    .from('messages')
                    .insert([{
                        from_user_id: currentUser.id,
                        to_user_id: currentChatUserId,
                        content: content,
                        is_read: false,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) {
                    console.error('send error:', error);
                    showAlert('发送失败: ' + error.message, 'error');
                } else {
                    document.getElementById('messageInput').value = '';
                    await loadChatMessages();
                    await loadMessageList();
                    showAlert('消息发送成功', 'success');
                }
            } catch (e) {
                console.error('sendChatMessage exception:', e);
                showAlert('发送失败: ' + e.message, 'error');
            }
        }
        
        function backToList() {
            stopMessagePolling();
            currentChatUserId = null;
            document.querySelector('[data-tab="chat"]').classList.remove('active');
            document.querySelector('[data-tab="list"]').classList.add('active');
            document.getElementById('chatTab').classList.add('hidden');
            document.getElementById('listTab').classList.remove('hidden');
            
            loadMessageList();
        }
    </script>
</body>
</html>

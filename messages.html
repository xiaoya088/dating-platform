<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 消息列表</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">💕 婚恋红娘系统 <span id="userNameDisplay" style="font-size: 14px; color: #888; font-weight: normal; margin-left: 10px;"></span></div>
        <ul class="navbar-nav">
            <li><a href="match.html">匹配推荐</a></li>
            <li><a href="messages.html" class="active">消息</a></li>
            <li><a href="announcements.html">公告</a></li>
            <li><a href="activities.html">线下活动</a></li>
            <li><a href="profile.html">个人资料</a></li>
            <li><a href="#" onclick="logout()">退出</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="card">
            <div class="card-header">消息列表</div>
            
            <div id="messageListView">
                <div id="messageList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            
            <div id="chatView" class="hidden">
                <div id="chatHeader" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                    <button class="btn btn-secondary btn-small" onclick="backToList()">← 返回</button>
                    <img id="chatAvatar" class="match-avatar" style="width: 45px; height: 45px;" src="">
                    <div style="flex: 1; min-width: 150px;">
                        <div id="chatName" style="font-weight: 600;"></div>
                        <div id="chatMeta" style="color: #888; font-size: 13px;"></div>
                    </div>
                </div>
                
                <div id="chatMessages" style="height: 50vh; max-height: 400px; min-height: 250px; overflow-y: auto; border: 1px solid #e1e5eb; border-radius: 8px; padding: 15px; background: #f8f9fa;"></div>
                
                <div style="margin-top: 15px;">
                    <div id="replyPreview" class="hidden" style="background: #f0f0f0; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; color: #666;">
                        <span id="replyToName"></span>: <span id="replyToContent"></span>
                        <button onclick="cancelReply()" style="float: right; border: none; background: none; color: #999; cursor: pointer; font-size: 16px;">×</button>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="messageInput" placeholder="输入消息..." style="flex: 1; font-size: 16px; padding: 12px; min-height: 44px;">
                        <button class="btn btn-primary" onclick="sendChatMessage()" style="padding: 12px 20px; min-height: 44px;">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="alertBox" class="hidden"></div>
    
    <script>
        let currentUser = null;
        let currentChatUserId = null;
        let currentChatUser = null;
        let messagePollInterval = null;
        let lastMessageCheckTime = null;
        let replyToMessageId = null;
        let replyToContent = '';
        let replyToName = '';

        
        function getCurrentUser() {
            const data = sessionStorage.getItem('currentUser');
            return data ? JSON.parse(data) : null;
        }
        
        document.addEventListener('DOMContentLoaded', async function() {
            currentUser = getCurrentUser();
            console.log('messages.html currentUser:', currentUser);
            
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('userNameDisplay').textContent = `欢迎, ${currentUser.name || '用户'}`;
            
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage();
                    }
                });
            }
            
            await loadMessageList();
        });
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            setTimeout(() => { alertBox.classList.add('hidden'); }, 3000);
        }
        
        function getUserPhotoUrl(user) {
            if (!user) return 'https://via.placeholder.com/40?text=无头像';
            let photos = user.photos;
            if (typeof photos === 'string') {
                try { photos = JSON.parse(photos); } catch (e) { photos = []; }
            }
            if (Array.isArray(photos) && photos.length > 0) return photos[0];
            return 'https://via.placeholder.com/40?text=无头像';
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '未知时间';
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) return '未知时间';
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
            return date.toLocaleDateString('zh-CN');
        }
        
        async function loadMessageList() {
            const supabase = getSupabase();
            const messageList = document.getElementById('messageList');
            messageList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const { data: sentMessages, error: sentError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (sentError) console.error('查询已发送消息失败:', sentError);
                
                const { data: receivedMessages, error: receivedError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('to_user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (receivedError) console.error('查询接收消息失败:', receivedError);
                
                const allMessages = [...(sentMessages || []), ...(receivedMessages || [])];
                const messages = allMessages.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.createdAt || 0);
                    const dateB = new Date(b.created_at || b.createdAt || 0);
                    return dateB - dateA;
                });
                
                if (!messages || messages.length === 0) {
                    messageList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">暂无私信记录</p>';
                    return;
                }
                
                const userIds = new Set();
                messages.forEach(m => {
                    if (m.from_user_id !== currentUser.id) userIds.add(m.from_user_id);
                    if (m.to_user_id !== currentUser.id) userIds.add(m.to_user_id);
                });
                
                const { data: users, error: usersError } = await supabase
                    .from('users')
                    .select('id, name, photos, province, city')
                    .in('id', Array.from(userIds));
                
                if (usersError) console.error('查询用户失败:', usersError);
                
                const userMap = {};
                users?.forEach(u => userMap[u.id] = u);
                
                // 同时查询中介信息
                const { data: agencies, error: agenciesError } = await supabase
                    .from('agencies')
                    .select('id, name, phone');
                
                if (agenciesError) console.error('查询中介信息失败:', agenciesError);
                
                const agencyMap = {};
                agencies?.forEach(a => agencyMap[a.id] = a);
                
                const conversations = {};
                messages.forEach(m => {
                    const otherId = m.from_user_id === currentUser.id ? m.to_user_id : m.from_user_id;
                    if (!conversations[otherId]) {
                        // 判断对方是普通用户还是中介
                        const otherUser = userMap[otherId];
                        const otherAgency = agencyMap[otherId];
                        
                        conversations[otherId] = {
                            user: otherUser || null,
                            agency: otherAgency || null,
                            lastMessage: m,
                            unreadCount: 0
                        };
                    }
                    if (m.to_user_id === currentUser.id && m.is_read === false) {
                        conversations[otherId].unreadCount++;
                    }
                });
                
                const convList = Object.values(conversations).sort((a, b) => {
                    const dateA = new Date(a.lastMessage.created_at || a.lastMessage.createdAt || 0);
                    const dateB = new Date(b.lastMessage.created_at || b.lastMessage.createdAt || 0);
                    return dateB - dateA;
                });
                
                messageList.innerHTML = convList.map(conv => {
                    const content = conv.lastMessage.content;
                    const displayContent = content ? content.substring(0, 50) : '[图片]';
                    
                    // 判断对方是普通用户还是中介
                    const isAgency = !!conv.agency;
                    const otherEntity = isAgency ? conv.agency : conv.user;
                    const otherId = otherEntity?.id || conv.lastMessage.from_user_id;
                    const otherName = otherEntity?.name || '匿名用户';
                    const isFromMe = conv.lastMessage.from_user_id === currentUser.id;
                    
                    return `
                        <div class="message-item" onclick="openChat('${otherId}', '${otherName}', ${isAgency})">
                            <img class="message-avatar" src="${isAgency ? 'https://via.placeholder.com/40?text=中介' : getUserPhotoUrl(conv.user)}">
                            <div class="message-content">
                                <div style="font-weight: 600;">${otherName}${isAgency ? ' 🏢' : ''}</div>
                                <div style="color: #888; font-size: 14px; margin-top: 5px;">${isAgency ? '[中介] ' : ''}${displayContent}${content && content.length > 50 ? '...' : ''}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="message-time">${formatTime(conv.lastMessage.created_at || conv.lastMessage.createdAt)}</div>
                                ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('loadMessageList exception:', e);
                messageList.innerHTML = `<p style="text-align: center; color: #e74c3c; padding: 40px;">加载消息列表失败: ${e.message}</p>`;
            }
        }
        
        let currentChatIsAgency = false;
        
        async function openChat(userId, userName, isAgency = false) {
            if (!userId) {
                showAlert('用户ID无效', 'error');
                return;
            }
            
            const supabase = getSupabase();
            currentChatUserId = userId;
            currentChatIsAgency = isAgency;
            
            if (isAgency) {
                // 如果是中介，查询中介信息
                const { data: agency, error: agencyError } = await supabase
                    .from('agencies')
                    .select('*')
                    .eq('id', userId)
                    .single();
                
                if (agencyError) {
                    console.error('获取中介信息失败:', agencyError);
                    showAlert('获取中介信息失败', 'error');
                    return;
                }
                
                currentChatUser = agency;
                
                if (agency) {
                    document.getElementById('chatAvatar').src = 'https://via.placeholder.com/45?text=中介';
                    document.getElementById('chatName').textContent = agency.name || '匿名中介';
                    document.getElementById('chatMeta').textContent = `🏢 中介机构 | ${agency.phone || ''}`;
                }
            } else {
                // 如果是普通用户，查询用户信息
                const { data: user, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();
                
                if (userError) {
                    console.error('获取用户信息失败:', userError);
                    showAlert('获取用户信息失败', 'error');
                    return;
                }
                
                currentChatUser = user;
                
                if (user) {
                    document.getElementById('chatAvatar').src = getUserPhotoUrl(user);
                    document.getElementById('chatName').textContent = user.name || '匿名用户';
                    document.getElementById('chatMeta').textContent = `${user.province || ''} ${user.city || ''}`;
                }
            }
            
            document.getElementById('messageListView').classList.add('hidden');
            document.getElementById('chatView').classList.remove('hidden');
            
            await loadChatMessages();
            
            await supabase
                .from('messages')
                .update({ is_read: true })
                .eq('from_user_id', userId)
                .eq('to_user_id', currentUser.id)
                .eq('is_read', false);
            
            startMessagePolling();
        }
        
        function startMessagePolling() {
            stopMessagePolling();
            lastMessageCheckTime = new Date();
            messagePollInterval = setInterval(async () => {
                if (currentChatUserId) await checkNewMessages();
                await loadMessageList();
            }, 10000);
        }
        
        function stopMessagePolling() {
            if (messagePollInterval) {
                clearInterval(messagePollInterval);
                messagePollInterval = null;
            }
        }
        
        async function checkNewMessages() {
            if (!currentChatUserId || !lastMessageCheckTime) return;
            
            const supabase = getSupabase();
            const { data: newMessages } = await supabase
                .from('messages')
                .select('id, created_at')
                .eq('from_user_id', currentChatUserId)
                .eq('to_user_id', currentUser.id)
                .gt('created_at', lastMessageCheckTime.toISOString());
            
            if (newMessages && newMessages.length > 0) {
                await loadChatMessages();
            }
            lastMessageCheckTime = new Date();
        }
        
        async function loadChatMessages() {
            const supabase = getSupabase();
            const chatMessages = document.getElementById('chatMessages');
            
            if (!currentChatUserId) {
                chatMessages.innerHTML = '<p style="text-align: center; color: #888;">请选择聊天对象</p>';
                return;
            }
            
            try {
                const { data: sentMessages, error: sentError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentUser.id)
                    .eq('to_user_id', currentChatUserId)
                    .order('created_at', { ascending: true });
                
                if (sentError) console.error('加载已发送消息失败:', sentError);
                
                const { data: receivedMessages, error: receivedError } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('from_user_id', currentChatUserId)
                    .eq('to_user_id', currentUser.id)
                    .order('created_at', { ascending: true });
                
                if (receivedError) console.error('加载接收消息失败:', receivedError);
                
                const messages = [...(sentMessages || []), ...(receivedMessages || [])];
                messages.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.createdAt || 0);
                    const dateB = new Date(b.created_at || b.createdAt || 0);
                    return dateA - dateB;
                });
                
                if (!messages || messages.length === 0) {
                    chatMessages.innerHTML = '<p style="text-align: center; color: #888;">暂无消息，开始对话吧</p>';
                    return;
                }
                
                chatMessages.innerHTML = messages.map(m => {
                    const isMine = m.from_user_id === currentUser.id;
                    const messageContent = m.content ? m.content : (m.image_url ? `<img src="${m.image_url}" style="max-width: 100%; cursor: pointer;" onclick="openPhotoPreview('${m.image_url}')">` : '[空消息]');
                    const showReplyBtn = !isMine;
                    const senderName = isMine ? '我' : (currentChatUser?.name || '对方');
                    
                    return `
                        <div style="display: flex; flex-direction: ${isMine ? 'row-reverse' : 'row'}; margin-bottom: 12px; align-items: flex-start;">
                            <div style="max-width: 75%; padding: 10px 14px; border-radius: 12px; background: ${isMine ? '#667eea' : '#e1e5eb'}; color: ${isMine ? 'white' : '#333'}; word-wrap: break-word;">
                                ${!isMine ? `<div style="font-size: 12px; color: #888; margin-bottom: 4px;">${senderName}</div>` : ''}
                                ${m.reply_to_content ? `<div style="background: rgba(0,0,0,0.1); padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; color: ${isMine ? 'rgba(255,255,255,0.8)' : '#666'};">@${m.reply_to_name || '对方'}: ${m.reply_to_content}</div>` : ''}
                                <div>${messageContent}</div>
                                <div style="font-size: 11px; color: ${isMine ? 'rgba(255,255,255,0.7)' : '#888'}; margin-top: 5px;">${formatTime(m.created_at || m.createdAt)}</div>
                            </div>
                            ${showReplyBtn ? `<button onclick="startReply('${m.id}', '${m.content || ''}', '${currentChatUser?.name || '对方'}')" style="margin-left: 8px; padding: 4px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; color: #666;">回复</button>` : ''}
                        </div>
                    `;
                }).join('');
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (e) {
                console.error('loadChatMessages exception:', e);
                chatMessages.innerHTML = `<p style="text-align: center; color: #e74c3c;">加载消息失败: ${e.message}</p>`;
            }
        }
        
        function startReply(messageId, content, senderName) {
            replyToMessageId = messageId;
            replyToContent = content;
            replyToName = senderName;
            
            document.getElementById('replyPreview').classList.remove('hidden');
            document.getElementById('replyToName').textContent = senderName;
            document.getElementById('replyToContent').textContent = content.substring(0, 50) + (content.length > 50 ? '...' : '');
            document.getElementById('messageInput').focus();
        }
        
        function cancelReply() {
            replyToMessageId = null;
            replyToContent = '';
            replyToName = '';
            document.getElementById('replyPreview').classList.add('hidden');
        }
        
        async function sendChatMessage() {
            console.log('📤 ========== 用户端发送私信开始 ==========');
            const input = document.getElementById('messageInput');
            
            if (!input) {
                console.error('❌ 找不到输入框');
                showAlert('页面错误：找不到输入框', 'error');
                return;
            }
            
            const content = input.value.trim();
            console.log('📝 输入内容:', content);
            
            if (!content) {
                showAlert('请输入消息内容', 'error');
                return;
            }
            
            if (!currentChatUserId) {
                console.error('❌ currentChatUserId 为空');
                showAlert('请先选择聊天对象', 'error');
                return;
            }
            
            console.log('👤 currentChatUserId:', currentChatUserId);
            console.log('👤 currentUser.id:', currentUser.id);
            
            const supabase = getSupabase();
            
            const messageData = {
                from_user_id: currentUser.id,
                to_user_id: currentChatUserId,
                content: content,
                is_read: false,
                created_at: new Date().toISOString()
            };
            
            if (replyToMessageId) {
                messageData.reply_to_id = replyToMessageId;
                messageData.reply_to_content = replyToContent;
                messageData.reply_to_name = replyToName;
            }
            
            console.log('📦 消息数据:', messageData);
            
            try {
                console.log('🔄 正在调用 supabase insert...');
                const { data, error } = await supabase
                    .from('messages')
                    .insert([messageData])
                    .select();
                
                if (error) {
                    console.error('❌ Supabase 插入错误:', error);
                    showAlert('发送失败: ' + error.message, 'error');
                } else {
                    console.log('✅ Supabase 插入成功:', data);
                    input.value = '';
                    cancelReply();
                    await loadChatMessages();
                    await loadMessageList();
                    console.log('✅ ========== 发送完成 ==========');
                }
            } catch (e) {
                console.error('❌ 发送异常:', e);
                showAlert('发送失败: ' + e.message, 'error');
            }
        }
        
        function backToList() {
            stopMessagePolling();
            currentChatUserId = null;
            currentChatUser = null;
            cancelReply();
            document.getElementById('messageListView').classList.remove('hidden');
            document.getElementById('chatView').classList.add('hidden');
            loadMessageList();
        }
    </script>
</body>
</html>

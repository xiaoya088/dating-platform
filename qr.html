<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>鹊桥缘 - 扫码入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 360px;
            width: 100%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 25px;
            border: 3px solid #f0f0f0;
        }
        .qr-container img {
            display: block;
            width: 200px;
            height: 200px;
        }
        .tip {
            background: #fff9e6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .tip-title {
            font-weight: bold;
            color: #d48806;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .tip-content {
            color: #8c8c8c;
            font-size: 12px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💕</div>
        <div class="title">鹊桥缘</div>
        <div class="subtitle">智能匹配 · 遇见真爱</div>
        
        <div class="qr-container">
            <img id="qrcode" src="" alt="二维码">
        </div>
        
        <div class="tip">
            <div class="tip-title">📱 使用说明</div>
            <div class="tip-content">
                1. 截图保存此二维码<br>
                2. 打开微信扫一扫<br>
                3. 点击右上角「···」<br>
                4. 选择「添加到桌面」
            </div>
        </div>
        
        <a href="splash.html" class="btn">直接进入系统</a>
    </div>
    
    <div class="footer">鹊桥缘婚恋系统 © 2024</div>

    <script>
        // 自动获取当前网站地址生成二维码
        const currentUrl = window.location.origin + window.location.pathname.replace('qr.html', '') + 'splash.html';
        
        // 使用 QR Server API 生成二维码
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=10&data=${encodeURIComponent(currentUrl)}`;
        
        document.getElementById('qrcode').src = qrUrl;
        
        // 如果是微信内置浏览器，引导添加到桌面
        function isWeChat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }
        
        if (isWeChat()) {
            document.querySelector('.tip-content').innerHTML = 
                '1. 点击右上角「···」<br>' +
                '2. 选择「添加到桌面」<br>' +
                '3. 桌面即可直接打开本系统';
        }
    </script>
</body>
</html>

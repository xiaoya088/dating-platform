<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 公告</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="match.html" class="back-link">← 返回</a>
        <span class="navbar-brand">📢 平台公告</span>
        <div></div>
    </nav>
    
    <div class="container">
        <div class="card">
            <div class="card-header">全部公告</div>
            <div id="announcementList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('user')) {
            try {
                const encodedUser = params.get('user');
                currentUser = JSON.parse(decodeURIComponent(encodedUser));
                localStorage.setItem('currentUser', decodeURIComponent(encodedUser));
            } catch (e) {
                console.error('解析用户数据失败:', e);
            }
        }
        
        if (!currentUser) {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        }
        
        if (!currentUser) {
            window.location.href = 'index.html';
        }
        
        loadAnnouncements();
        
        function updateNavLinks() {
            const links = document.querySelectorAll('a[href="profile.html"]');
            if (links.length > 0 && currentUser) {
                const userDataStr = JSON.stringify(currentUser);
                const encodedData = encodeURIComponent(userDataStr);
                links.forEach(link => {
                    link.href = 'profile.html?user=' + encodedData;
                });
            }
        }
        
        updateNavLinks();
        
        async function loadAnnouncements() {
            const listEl = document.getElementById('announcementList');
            
            try {
                const supabase = getSupabase();
                const { data, error } = await supabase
                    .from('announcements')
                    .select('*')
                    .order('is_pinned', { ascending: false })
                    .order('created_at', { ascending: false });
                
                if (error) {
                    listEl.innerHTML = `<div class="empty">加载失败: ${error.message}</div>`;
                    return;
                }
                
                if (!data || data.length === 0) {
                    listEl.innerHTML = '<div class="empty">暂无公告</div>';
                    return;
                }
                
                listEl.innerHTML = data.map(a => `
                    <div style="padding: 15px; border-bottom: 1px solid #eee;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <strong style="color: #667eea; font-size: 16px;">${escapeHtml(a.title || '公告')}</strong>
                            ${a.is_pinned ? '<span style="background:#ff6b6b; color:#fff; padding:2px 8px; border-radius:10px; font-size:12px;">置顶</span>' : ''}
                        </div>
                        <p style="color: #333; line-height: 1.6; margin-bottom: 8px;">${escapeHtml(a.content)}</p>
                        <small style="color: #999;">${new Date(a.created_at).toLocaleString('zh-CN')}</small>
                    </div>
                `).join('');
                
            } catch (e) {
                listEl.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据迁移 - 缘来是你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00cec9 0%, #6c5ce7 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #27ae60 100%);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #c0392b 100%);
            color: white;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.info { background: #d1ecf1; color: #0c5460; display: block; }
        .data-preview {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 数据迁移工具</h1>
        
        <div class="card">
            <h2>📁 本地数据统计</h2>
            <div class="stats" id="localStats"></div>
            <button class="btn btn-primary" onclick="showLocalData()">查看本地数据</button>
            <div id="localData" class="data-preview" style="display: none;"></div>
        </div>

        <div class="card">
            <h2>☁️ Supabase 数据统计</h2>
            <div class="stats" id="remoteStats"></div>
            <button class="btn btn-primary" onclick="loadRemoteStats()">刷新远程数据</button>
        </div>

        <div class="card">
            <h2>🔄 数据迁移</h2>
            <p style="margin-bottom: 15px; color: #666;">将本地 localStorage 数据迁移到 Supabase 云端数据库</p>
            <button class="btn btn-success" onclick="migrateData()">🚀 开始迁移</button>
            <button class="btn btn-danger" onclick="clearLocalData()" style="float: right;">🗑️ 清空本地数据</button>
            <div id="migrateStatus" class="status"></div>
        </div>

        <div class="card" style="text-align: center;">
            <a href="admin.html" class="btn btn-primary">进入管理后台</a>
            <a href="index.html" class="btn btn-primary" style="margin-left: 10px;">返回首页</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabase = null;

        // 初始化
        async function init() {
            try {
                // 加载配置
                const response = await fetch('/supabase-config.js');
                const configText = await response.text();
                const urlMatch = configText.match(/url:\s*["']([^"']+)["']/);
                const keyMatch = configText.match(/anonKey:\s*["']([^"']+)["']/);
                
                if (urlMatch && keyMatch) {
                    supabase = window.supabase.createClient(urlMatch[1], keyMatch[1]);
                    console.log('Supabase 初始化成功');
                }
            } catch (error) {
                console.error('初始化失败:', error);
            }
            
            // 加载统计数据
            loadLocalStats();
            loadRemoteStats();
        }

        // 加载本地统计
        function loadLocalStats() {
            const users = JSON.parse(localStorage.getItem('datingUsers') || '[]');
            const posts = JSON.parse(localStorage.getItem('datingPosts') || '[]');
            const reports = JSON.parse(localStorage.getItem('datingReports') || '[]');
            const activities = JSON.parse(localStorage.getItem('activities') || '[]');
            
            document.getElementById('localStats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${users.length}</div><div class="stat-label">用户</div></div>
                <div class="stat-card"><div class="stat-value">${posts.length}</div><div class="stat-label">动态</div></div>
                <div class="stat-card"><div class="stat-value">${reports.length}</div><div class="stat-label">举报</div></div>
                <div class="stat-card"><div class="stat-value">${activities.length}</div><div class="stat-label">活动</div></div>
            `;
        }

        // 显示本地数据
        function showLocalData() {
            const data = {
                datingUsers: JSON.parse(localStorage.getItem('datingUsers') || '[]'),
                datingPosts: JSON.parse(localStorage.getItem('datingPosts') || '[]'),
                datingReports: JSON.parse(localStorage.getItem('datingReports') || '[]'),
                activities: JSON.parse(localStorage.getItem('activities') || '[]'),
                sensitiveWords: JSON.parse(localStorage.getItem('sensitiveWords') || '[]')
            };
            document.getElementById('localData').textContent = JSON.stringify(data, null, 2);
            document.getElementById('localData').style.display = 'block';
        }

        // 加载远程统计
        async function loadRemoteStats() {
            if (!supabase) {
                document.getElementById('remoteStats').innerHTML = '<p style="color: #dc3545;">请先配置 Supabase</p>';
                return;
            }

            try {
                const [usersRes, postsRes, reportsRes, activitiesRes] = await Promise.all([
                    supabase.from('users').select('*'),
                    supabase.from('posts').select('*'),
                    supabase.from('reports').select('*'),
                    supabase.from('activities').select('*')
                ]);

                document.getElementById('remoteStats').innerHTML = `
                    <div class="stat-card"><div class="stat-value">${usersRes.data?.length || 0}</div><div class="stat-label">用户</div></div>
                    <div class="stat-card"><div class="stat-value">${postsRes.data?.length || 0}</div><div class="stat-label">动态</div></div>
                    <div class="stat-card"><div class="stat-value">${reportsRes.data?.length || 0}</div><div class="stat-label">举报</div></div>
                    <div class="stat-card"><div class="stat-value">${activitiesRes.data?.length || 0}</div><div class="stat-label">活动</div></div>
                `;
            } catch (error) {
                console.error('加载远程数据失败:', error);
                document.getElementById('remoteStats').innerHTML = `<p style="color: #dc3545;">加载失败: ${error.message}</p>`;
            }
        }

        // 迁移数据
        async function migrateData() {
            if (!supabase) {
                showStatus('migrateStatus', 'error', '请先配置 Supabase');
                return;
            }

            showStatus('migrateStatus', 'info', '正在迁移数据...');

            let successCount = 0;
            let failCount = 0;

            try {
                // 迁移用户
                const localUsers = JSON.parse(localStorage.getItem('datingUsers') || '[]');
                for (const user of localUsers) {
                    try {
                        // 检查是否已存在
                        const { data: exists } = await supabase.from('users').select('id').eq('phone', user.phone);
                        if (exists && exists.length > 0) {
                            console.log(`用户 ${user.phone} 已存在，跳过`);
                            continue;
                        }
                        
                        await supabase.from('users').insert([user]);
                        successCount++;
                    } catch (e) {
                        failCount++;
                        console.error(`迁移用户失败: ${e.message}`);
                    }
                }

                // 迁移动态
                const localPosts = JSON.parse(localStorage.getItem('datingPosts') || '[]');
                for (const post of localPosts) {
                    try {
                        await supabase.from('posts').insert([post]);
                        successCount++;
                    } catch (e) {
                        failCount++;
                    }
                }

                // 迁移举报
                const localReports = JSON.parse(localStorage.getItem('datingReports') || '[]');
                for (const report of localReports) {
                    try {
                        await supabase.from('reports').insert([report]);
                        successCount++;
                    } catch (e) {
                        failCount++;
                    }
                }

                // 迁移活动
                const localActivities = JSON.parse(localStorage.getItem('activities') || '[]');
                for (const activity of localActivities) {
                    try {
                        const { data: exists } = await supabase.from('activities').select('id').eq('name', activity.name);
                        if (exists && exists.length > 0) continue;
                        
                        await supabase.from('activities').insert([activity]);
                        successCount++;
                    } catch (e) {
                        failCount++;
                    }
                }

                showStatus('migrateStatus', 'success', `迁移完成！成功: ${successCount}, 失败: ${failCount}`);
                loadRemoteStats(); // 刷新统计
            } catch (error) {
                showStatus('migrateStatus', 'error', `迁移失败: ${error.message}`);
            }
        }

        // 清空本地数据
        function clearLocalData() {
            if (!confirm('确定要清空所有本地数据吗？此操作不可撤销！')) return;
            
            localStorage.removeItem('datingUsers');
            localStorage.removeItem('datingPosts');
            localStorage.removeItem('datingReports');
            localStorage.removeItem('activities');
            localStorage.removeItem('sensitiveWords');
            localStorage.removeItem('datingCurrentUser');
            
            loadLocalStats();
            showStatus('migrateStatus', 'info', '本地数据已清空');
        }

        // 显示状态
        function showStatus(elementId, type, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status ${type}`;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

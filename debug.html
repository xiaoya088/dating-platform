<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试工具 - 缘来是你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #27ae60 100%);
            color: white;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .log-box {
            background: #2d2d2d;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            min-height: 200px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
        }
        .config-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 数据库调试工具</h1>
        
        <div class="card">
            <h3>📋 当前配置</h3>
            <div class="config-info" id="configInfo"></div>
            <button class="btn btn-primary" onclick="loadConfig()">重新加载配置</button>
        </div>

        <div class="card">
            <h3>🔗 测试连接</h3>
            <button class="btn btn-success" onclick="testConnection()">测试数据库连接</button>
            <div id="connectionStatus" class="status"></div>
        </div>

        <div class="card">
            <h3>📊 查询用户数据</h3>
            <button class="btn btn-primary" onclick="queryUsers()">查询用户列表</button>
            <div id="usersStatus" class="status"></div>
        </div>

        <div class="card">
            <h3>➕ 测试插入数据</h3>
            <button class="btn btn-success" onclick="testInsert()">插入测试用户</button>
            <div id="insertStatus" class="status"></div>
        </div>

        <div class="card">
            <h3>📝 控制台日志</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabase = null;
        const logBox = document.getElementById('logBox');

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logBox.innerHTML += `[${timestamp}] ${message}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function loadConfig() {
            try {
                const response = await fetch('/supabase-config.js');
                const text = await response.text();
                
                const urlMatch = text.match(/url:\s*["']([^"']+)["']/);
                const keyMatch = text.match(/anonKey:\s*["']([^"']+)["']/);
                
                document.getElementById('configInfo').innerHTML = `
                    <strong>URL:</strong> ${urlMatch ? urlMatch[1] : '未找到'}<br>
                    <strong>Key:</strong> ${keyMatch ? keyMatch[1].substring(0, 20) + '...' : '未找到'}<br>
                    <strong>Supabase SDK:</strong> ${window.supabase ? '已加载' : '未加载'}
                `;
                
                log('配置加载完成');
            } catch (error) {
                log('加载配置失败: ' + error.message);
            }
        }

        async function testConnection() {
            const status = document.getElementById('connectionStatus');
            status.className = 'status info';
            status.textContent = '正在测试连接...';

            try {
                const response = await fetch('/supabase-config.js');
                const text = await response.text();
                
                const urlMatch = text.match(/url:\s*["']([^"']+)["']/);
                const keyMatch = text.match(/anonKey:\s*["']([^"']+)["']/);

                if (!urlMatch || !keyMatch) {
                    status.className = 'status error';
                    status.textContent = '❌ 配置文件格式错误';
                    log('配置文件格式错误');
                    return;
                }

                if (!window.supabase) {
                    status.className = 'status error';
                    status.textContent = '❌ Supabase SDK 未加载';
                    log('Supabase SDK 未加载');
                    return;
                }

                supabase = window.supabase.createClient(urlMatch[1], keyMatch[1]);
                log('创建 Supabase 客户端成功');

                // 测试查询
                const { data, error } = await supabase.from('users').select('*').limit(1);
                
                if (error) {
                    status.className = 'status error';
                    status.textContent = '❌ 连接失败: ' + error.message;
                    log('连接失败: ' + error.message);
                } else {
                    status.className = 'status success';
                    status.textContent = `✅ 连接成功！数据库中有 ${data.length} 条记录`;
                    log('连接成功，用户数量: ' + data.length);
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ 测试失败: ' + error.message;
                log('测试失败: ' + error.message);
            }
        }

        async function queryUsers() {
            const status = document.getElementById('usersStatus');
            
            if (!supabase) {
                status.className = 'status error';
                status.textContent = '请先测试连接';
                return;
            }

            try {
                const { data, error } = await supabase.from('users').select('*');
                
                if (error) {
                    status.className = 'status error';
                    status.textContent = '查询失败: ' + error.message;
                } else {
                    status.className = 'status success';
                    status.textContent = '查询成功！\n' + JSON.stringify(data, null, 2);
                    log('查询用户成功，数量: ' + data.length);
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '查询失败: ' + error.message;
            }
        }

        async function testInsert() {
            const status = document.getElementById('insertStatus');
            
            if (!supabase) {
                status.className = 'status error';
                status.textContent = '请先测试连接';
                return;
            }

            const testUser = {
                phone: '138' + Math.floor(Math.random() * 100000000),
                password: 'test123',
                nickname: '测试用户',
                gender: '男',
                status: 'approved',
                registeredat: new Date().toISOString()
            };

            try {
                const { data, error } = await supabase.from('users').insert([testUser]).select().single();
                
                if (error) {
                    status.className = 'status error';
                    status.textContent = '插入失败: ' + error.message;
                    log('插入失败: ' + error.message);
                } else {
                    status.className = 'status success';
                    status.textContent = '✅ 插入成功！\n' + JSON.stringify(data, null, 2);
                    log('插入测试用户成功');
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '插入失败: ' + error.message;
            }
        }

        // 页面加载时自动加载配置
        document.addEventListener('DOMContentLoaded', () => {
            log('页面加载完成');
            loadConfig();
        });
    </script>
</body>
</html>

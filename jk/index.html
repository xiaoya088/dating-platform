<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK健康管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 420px;
            padding: 45px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            color: #718096;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }
        
        .btn-outline:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .btn-danger {
            background: #e53e3e;
        }
        
        .btn-success {
            background: #48bb78;
        }
        
        .btn-warning {
            background: #ed8936;
        }
        
        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 22px;
            font-size: 14px;
            display: none;
        }
        
        .alert.error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }
        
        .alert.success {
            background: #f0fff4;
            color: #38a169;
            border: 1px solid #9ae6b4;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .link {
            text-align: center;
            margin-top: 25px;
            color: #718096;
            font-size: 14px;
        }
        
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .link a:hover {
            text-decoration: underline;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #a0aec0;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .gender-selector {
            display: flex;
            gap: 15px;
        }
        
        .gender-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gender-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            cursor: pointer;
            margin-bottom: 0 !important;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .step {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #a0aec0;
            transition: all 0.3s;
        }
        
        .step.active {
            background: #667eea;
            color: white;
        }
        
        .step.completed {
            background: #48bb78;
            color: white;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 主界面样式 */
        #mainView {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        
        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #f7fafc;
            color: #4a5568;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        .nav-btn:hover {
            background: #e2e8f0;
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .nav-btn.admin {
            background: #fef5e7;
            color: #d69e2e;
        }
        
        .nav-btn.admin:hover, .nav-btn.admin.active {
            background: #ed8936;
            color: white;
        }
        
        #contentArea {
            min-height: 500px;
        }
        
        .card {
            background: #f7fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .card-white {
            background: white;
            border: 1px solid #e2e8f0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            padding: 25px;
            border-radius: 15px;
            color: white;
        }
        
        .stat-card.purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card.green { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
        .stat-card.orange { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); }
        .stat-card.pink { background: linear-gradient(135deg, #9f7aea 0%, #805ad5 100%); }
        
        .stat-label { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: 700; }
        .stat-unit { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 15px;
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .product-title {
            margin-bottom: 10px;
            color: #2d3748;
            font-size: 18px;
            font-weight: 600;
        }
        
        .product-desc {
            color: #718096;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .product-price {
            color: #e53e3e;
            font-size: 24px;
            font-weight: 700;
        }
        
        .product-original-price {
            color: #a0aec0;
            text-decoration: line-through;
            margin-left: 10px;
        }
        
        .qty-control {
            display: flex;
            gap: 5px;
        }
        
        .qty-btn {
            width: 35px;
            height: 35px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            background: white;
        }
        
        .qty-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .qty-display {
            width: 40px;
            text-align: center;
            line-height: 35px;
        }
        
        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th {
            padding: 15px;
            text-align: left;
            color: #4a5568;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
            background: #f7fafc;
        }
        
        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .badge-warning {
            background: #fef5e7;
            color: #d69e2e;
        }
        
        .badge-danger {
            background: #fed7d7;
            color: #c53030;
        }
        
        .badge-info {
            background: #ebf8ff;
            color: #2c7a7b;
        }
        
        .badge-default {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
        }
        
        .modal-close {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            background: #e2e8f0;
            cursor: pointer;
            font-size: 20px;
            color: #718096;
        }
        
        .modal-close:hover {
            background: #cbd5e0;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }
        
        .comment-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .comment-item {
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .comment-content {
            color: #4a5568;
            line-height: 1.6;
        }
        
        .comment-time {
            font-size: 12px;
            color: #a0aec0;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #a0aec0;
        }
        
        .float-right {
            float: right;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        
        /* 导航菜单 */
        .nav-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .admin-nav {
            display: none;
            margin-left: auto;
            flex-wrap: wrap;
        }
        
        /* 移动端响应式样式 */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            
            .container {
                width: 100%;
                padding: 20px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .nav-menu {
                gap: 8px;
                margin-bottom: 20px;
            }
            
            .nav-btn {
                padding: 8px 12px !important;
                font-size: 12px !important;
                flex: 1 1 auto;
                min-width: calc(33% - 10px);
                text-align: center;
            }
            
            .admin-nav {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
            }
            
            .admin-nav .nav-btn {
                min-width: calc(50% - 10px);
            }
            
            .card {
                padding: 15px;
                margin-bottom: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr !important;
            }
            
            .product-grid {
                grid-template-columns: 1fr !important;
            }
            
            .data-table {
                font-size: 12px;
                overflow-x: auto;
            }
            
            .data-table th, .data-table td {
                padding: 8px 5px;
                white-space: nowrap;
            }
            
            h2 {
                font-size: 18px !important;
            }
            
            h3 {
                font-size: 16px !important;
            }
            
            input, select, textarea {
                font-size: 16px !important; /* 防止iOS缩放 */
            }
            
            .modal-content {
                width: 95%;
                padding: 15px;
                margin: 10% auto;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 14px;
                width: 100%;
            }
            
            /* 隐藏桌面端元素 */
            .desktop-only {
                display: none;
            }
        }
        
        @media screen and (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header .user-info {
                margin-top: 10px;
                width: 100%;
            }
            
            .nav-btn {
                padding: 8px 6px !important;
                font-size: 11px !important;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 24px;
            }
            
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 登录视图 -->
    <div id="loginView" class="container">
        <div class="header">
            <h1>🏥 JK健康管理系统</h1>
            <p>关爱健康，从每一天开始</p>
        </div>
        
        <div id="loginAlert" class="alert"></div>
        
        <div class="form-group">
            <label for="loginPhone">账号</label>
            <input type="text" id="loginPhone" placeholder="管理员输入用户名，用户输入手机号">
        </div>
        
        <div class="form-group">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        
        <button class="btn" id="loginBtn">登录</button>
        
        <div class="link" style="display: flex; justify-content: space-between;">
            <a href="#" onclick="showRegister()">立即注册</a>
            <a href="#" onclick="showForgotPassword()" style="color: #718096;">找回密码</a>
        </div>
    </div>
    
    <!-- 找回密码视图 -->
    <div id="forgotPasswordView" class="container hidden">
        <div class="header">
            <h1>🔑 找回密码</h1>
            <p>密码将以短信方式发送到您的手机</p>
        </div>
        
        <div id="forgotAlert" class="alert"></div>
        
        <div class="form-group">
            <label for="forgotPhone">手机号</label>
            <input type="tel" id="forgotPhone" placeholder="请输入注册时的手机号">
        </div>
        
        <button class="btn" onclick="submitForgotPassword()">发送密码</button>
        
        <div class="link">
            <a href="#" onclick="showLogin()">返回登录</a>
        </div>
    </div>
    
    <!-- 注册视图 -->
    <div id="registerView" class="container hidden">
        <div class="header">
            <h1>🏥 注册账号</h1>
            <p>开始您的健康管理之旅</p>
        </div>
        
        <div id="registerAlert" class="alert"></div>
        
        <div class="form-group">
            <label for="regPhone">手机号</label>
            <input type="tel" id="regPhone" placeholder="请输入手机号">
        </div>
        
        <div class="form-group">
            <label for="regPassword">设置密码</label>
            <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
        </div>
        
        <div class="form-group">
            <label for="regConfirmPassword">确认密码</label>
            <input type="password" id="regConfirmPassword" placeholder="请再次输入密码">
        </div>
        
        <div class="form-group">
            <label for="regReferralCode">推荐码（选填）</label>
            <input type="text" id="regReferralCode" placeholder="如果您有推荐人的二维码，请输入推荐码">
        </div>
        
        <button class="btn" id="regBtn">注册</button>
        <button class="btn btn-secondary" onclick="showLogin()">返回登录</button>
    </div>
    
    <!-- 加载视图 -->
    <div id="loadingView" class="container hidden">
        <div class="loading">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div id="mainView" class="hidden">
        <div class="main-header">
            <div>
                <h1>🏥 JK健康管理系统</h1>
                <p id="userGreeting" style="color: #718096; margin-top: 5px;"></p>
            </div>
            <div>
                <span id="userRole" style="margin-right: 20px; padding: 8px 16px; border-radius: 20px; font-size: 14px;"></span>
                <button onclick="logout()" style="padding: 10px 25px; background: #e53e3e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">退出登录</button>
            </div>
        </div>
        
        <!-- 导航菜单 -->
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showSection('dashboard')">📊 健康概览</button>
            <button class="nav-btn" onclick="showSection('daily-record')">📝 每日记录</button>
            <button class="nav-btn" onclick="showSection('consultation')">💬 健康咨询</button>
            <button class="nav-btn" onclick="showSection('products')">🛒 产品中心</button>
            <button class="nav-btn" onclick="showSection('community')">👥 健康社区</button>
            <button class="nav-btn" onclick="showSection('profile')">👤 个人中心</button>
            <div id="adminNav" class="admin-nav">
                <button class="nav-btn admin" onclick="showSection('admin-users')">👨‍⚕️ 用户管理</button>
                <button class="nav-btn admin" onclick="showSection('admin-products')">📦 产品管理</button>
                <button class="nav-btn admin" onclick="showSection('admin-consultations')">📋 咨询管理</button>
                <button class="nav-btn admin" onclick="showSection('admin-referral')">🎁 推荐配置</button>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div id="contentArea"></div>
    </div>
    
    <!-- 模态框 -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">标题</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let selectedGender = '';
        let shoppingCart = [];
        let systemConfig = {}; // 系统配置缓存
        
        // 页面加载时初始化Supabase
        document.addEventListener('DOMContentLoaded', function() {
            initSupabase();
            console.log('页面加载完成，Supabase已初始化');
            // 页面加载时就处理URL中的推荐码（扫描二维码后直接处理）
            handleReferralCodeFromURL();
        });

        // 页面加载时处理推荐码（扫码后打开页面）
        function handleReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const referralCode = urlParams.get('referral');
            const regReferralCode = document.getElementById('regReferralCode');
            
            console.log('=== 处理推荐码 ===');
            console.log('URL推荐码:', referralCode);
            console.log('推荐码输入框元素:', regReferralCode ? '存在' : '不存在');
            console.log('localStorage现有推荐码:', localStorage.getItem('pendingReferralCode'));
            console.log('localStorage推荐码时间:', localStorage.getItem('pendingReferralCodeTime'));
            
            if (referralCode) {
                // 保存推荐码到本地存储，记录扫码时间
                localStorage.setItem('pendingReferralCode', referralCode);
                localStorage.setItem('pendingReferralCodeTime', Date.now().toString());
                console.log('推荐码已保存到localStorage:', referralCode);
                
                // 自动填充到注册表单
                if (regReferralCode) {
                    regReferralCode.value = referralCode;
                    console.log('推荐码已填充到注册表单');
                } else {
                    console.log('注册表单输入框不存在，推荐码已保存到localStorage');
                }
                
                // 清除URL参数
                const cleanUrl = window.location.pathname + window.location.hash;
                window.history.replaceState({}, document.title, cleanUrl);
            } else if (regReferralCode) {
                // URL中没有推荐码，检查localStorage中是否有有效推荐码
                const storedReferralCode = localStorage.getItem('pendingReferralCode');
                const storedTime = localStorage.getItem('pendingReferralCodeTime');
                const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
                
                if (storedReferralCode && storedTime && (Date.now() - parseInt(storedTime)) < thirtyDaysMs) {
                    // 在有效期内，填充到输入框
                    regReferralCode.value = storedReferralCode;
                    console.log('从localStorage读取推荐码并填充:', storedReferralCode);
                } else {
                    console.log('localStorage中无有效推荐码');
                }
            } else {
                console.log('无URL推荐码，注册输入框不存在');
            }
        }

            try {

        // 生成推荐码
        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        // 注册（简化版：仅需手机号和密码）
        async function register() {
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const referralCode = document.getElementById('regReferralCode').value;
            
            console.log('=== 注册开始 ===');
            console.log('输入框推荐码:', referralCode);
            console.log('localStorage推荐码:', localStorage.getItem('pendingReferralCode'));
            console.log('localStorage推荐码时间:', localStorage.getItem('pendingReferralCodeTime'));
            
            if (!phone || !password) {
                showAlert('registerAlert', '请填写手机号和密码', 'error');
                return;
            }
            
            // 验证手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showAlert('registerAlert', '请输入正确的手机号', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('registerAlert', '密码至少需要6位', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('registerAlert', '两次输入的密码不一致', 'error');
                return;
            }
            
            document.getElementById('regBtn').disabled = true;
            
            try {
                const supabase = getJkSupabase();
                
                // 检查手机号是否已注册
                const { data: existingUser } = await supabase
                    .from('jk_users')
                    .select('id')
                    .eq('phone', phone)
                    .single();
                
                if (existingUser) {
                    showAlert('registerAlert', '该手机号已注册', 'error');
                    document.getElementById('regBtn').disabled = false;
                    return;
                }
                
                // 生成用户的推荐码
                const userReferralCode = generateReferralCode();
                
                // 获取推荐码优先级：URL参数 > 本地存储（30天有效）
                let finalReferralCode = referralCode; // URL参数优先（从输入框获取）
                let referrerId = null;
                
                console.log('=== 推荐关系处理开始 ===');
                console.log('输入框推荐码:', referralCode);
                
                // 如果输入框没有推荐码，检查本地存储
                if (!finalReferralCode) {
                    finalReferralCode = localStorage.getItem('pendingReferralCode');
                    console.log('从localStorage读取推荐码:', finalReferralCode);
                }
                
                // 如果有推荐码，查询推荐人
                if (finalReferralCode) {
                    const storedTime = localStorage.getItem('pendingReferralCodeTime');
                    const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
                    
                    console.log('推荐码有效期检查:', storedTime, Date.now() - parseInt(storedTime) < thirtyDaysMs);
                    
                    if (storedTime && (Date.now() - parseInt(storedTime)) < thirtyDaysMs) {
                        // 在有效期内，使用该推荐码查询推荐人
                        console.log('推荐码有效，查询推荐人:', finalReferralCode);
                        const { data: referrer, error: referrerError } = await supabase
                            .from('jk_users')
                            .select('id')
                            .eq('referral_code', finalReferralCode)
                            .single();
                        
                        console.log('查询推荐人结果:', referrer, '错误:', referrerError);
                        
                        if (referrer) {
                            referrerId = referrer.id;
                            console.log('找到推荐人ID:', referrerId);
                        } else {
                            console.log('未找到推荐人，推荐码:', finalReferralCode);
                        }
                    } else {
                        console.log('推荐码已过期或无保存时间');
                    }
                    // 不管是否有效，都清除本地存储的推荐码（已使用或已过期）
                    localStorage.removeItem('pendingReferralCode');
                    localStorage.removeItem('pendingReferralCodeTime');
                    console.log('已清除localStorage中的推荐码');
                } else {
                    console.log('无推荐码，跳过推荐人查询');
                }
                
                console.log('=== 推荐关系处理结束 ===');
                console.log('最终推荐人ID:', referrerId, '推荐码:', finalReferralCode);
                
                // 创建新用户（不手动设置ID，让数据库自动生成UUID）
                const { data: insertedUser, error: userError } = await supabase
                    .from('jk_users')
                    .insert({
                        username: phone,
                        phone: phone,
                        password: password,
                        role: 'user',
                        status: 'active',
                        points: 0,
                        referral_code: userReferralCode,
                        show_qr_code: false
                    })
                    .select();
                
                if (userError) {
                    showAlert('registerAlert', userError.message, 'error');
                    document.getElementById('regBtn').disabled = false;
                    return;
                }
                
                const newUserId = insertedUser[0].id;
                console.log('新用户ID:', newUserId);
                
                // 创建基础健康信息记录
                // 推荐关系永久有效（referral_valid_until为null表示无期限）
                console.log('=== 保存推荐关系 ===');
                console.log('用户ID:', newUserId);
                console.log('推荐人ID:', referrerId);
                console.log('使用的推荐码:', finalReferralCode);
                
                const { error: healthError } = await supabase
                    .from('jk_user_health_info')
                    .insert({
                        user_id: newUserId,
                        referrer_id: referrerId,
                        referral_code_used: finalReferralCode,
                        referral_valid_until: null, // 永久有效
                        created_at: new Date().toISOString()
                    });
                
                if (healthError) {
                    console.error('健康信息创建失败:', healthError);
                } else {
                    console.log('健康信息创建成功，推荐关系已保存');
                }
                
                showAlert('registerAlert', '注册成功！正在登录...', 'success');
                
                // 自动登录
                setTimeout(() => {
                    document.getElementById('loginPhone').value = phone;
                    document.getElementById('loginPassword').value = password;
                    login();
                }, 1000);
            } catch (err) {
                console.error('注册错误:', err);
                showAlert('registerAlert', '注册失败，请检查网络连接', 'error');
                document.getElementById('regBtn').disabled = false;
            }
        }

        // 添加到购物车
        function addToCart(productId, index) {
            const quantity = parseInt(document.getElementById(`qty_${index}`).textContent);
            const existingItem = shoppingCart.find(item => item.productId === productId);
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                shoppingCart.push({ productId, quantity });
            }
            
            document.getElementById(`qty_${index}`).textContent = '1';
            alert('已添加到购物车');

        // 结算
        async function checkout() {
            if (shoppingCart.length === 0) return;
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    alert('系统错误，请刷新页面重试');
                    return;
                }
                
                const orderNo = 'ORD' + Date.now();
                const totalAmount = shoppingCart.reduce((sum, item) => {
                    const product = defaultProducts.find(p => p.id === item.productId);
                    return sum + (product?.price || 0) * item.quantity;
                }, 0);
                
                const { data: order, error: orderError } = await supabase
                    .from('jk_orders')
                    .insert({
                        user_id: currentUser.id,
                        order_no: orderNo,
                        total_amount: totalAmount,
                        status: 'pending'
                    })
                    .select()
                    .single();
                
                if (orderError) {
                    alert('创建订单失败：' + orderError.message);
                    return;
                }
                
                for (const item of shoppingCart) {
                    const product = defaultProducts.find(p => p.id === item.productId);
                    await supabase
                        .from('jk_order_items')
                        .insert({
                            order_id: order.id,
                            product_id: item.productId,
                            quantity: item.quantity,
                            unit_price: product?.price || 0,
                            total_price: (product?.price || 0) * item.quantity
                        });
                }
                
                shoppingCart = [];
                alert('订单创建成功！');
                loadProducts();
            } catch (err) {
                alert('结算失败，请重试');
            }
        }

        // 保存健康信息
        async function saveHealthInfo() {
            const gender = modalSelectedGender;
            const birthday = document.getElementById('modalBirthday').value;
            const height = document.getElementById('modalHeight').value;
            const weight = document.getElementById('modalWeight').value;
            const bloodType = document.getElementById('modalBloodType').value;
            const allergies = document.getElementById('modalAllergies').value;
            const medicalHistory = document.getElementById('modalMedicalHistory').value;
            
            try {
                const supabase = getJkSupabase();
                
                // 检查是否已有健康信息记录
                const { data: existingInfo } = await supabase
                    .from('jk_user_health_info')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (existingInfo) {
                    // 更新现有记录
                    const { error } = await supabase
                        .from('jk_user_health_info')
                        .update({
                            gender,
                            birthday: birthday || null,
                            height: height ? parseFloat(height) : null,
                            weight: weight ? parseFloat(weight) : null,
                            blood_type: bloodType || null,
                            allergies: allergies || null,
                            medical_history: medicalHistory || null,
                            updated_at: new Date().toISOString()
                        })
                        .eq('user_id', currentUser.id);
                    
                    if (error) {
                        showAlert('healthInfoAlert', error.message, 'error');
                        return;
                    }
                } else {
                    // 创建新记录
                    const { error } = await supabase
                        .from('jk_user_health_info')
                        .insert({
                            user_id: currentUser.id,
                            gender,
                            birthday: birthday || null,
                            height: height ? parseFloat(height) : null,
                            weight: weight ? parseFloat(weight) : null,
                            blood_type: bloodType || null,
                            allergies: allergies || null,
                            medical_history: medicalHistory || null,

            document.getElementById('modalBody').innerHTML = `

        // 提交消费记录
        async function submitConsumption(userId) {
            const amount = parseFloat(document.getElementById('consumptionAmount').value);
            const description = document.getElementById('consumptionDesc').value;
            
            if (isNaN(amount) || amount <= 0) {
                alert('请输入有效的消费金额（必须大于0）');
                return;
            }
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    alert('系统错误，请刷新页面重试');
                    return;
                }
                
                if (!currentUser || !currentUser.id) {
                    alert('请先登录');
                    return;
                }
                
                // 插入消费记录
                const { data: consumptionData, error: consumptionError } = await supabase
                    .from('jk_consumption_records')
                    .insert({
                        user_id: userId,
                        amount,
                        description: description || '手动录入消费',
                        record_type: 'manual',
                        created_by: currentUser.id
                    })
                    .select();
                
                if (consumptionError) {
                    console.error('消费记录插入失败:', consumptionError);
                    alert('消费记录保存失败：' + consumptionError.message);
                    return;
                }
                
                const consumptionId = consumptionData[0]?.id;
                
                // 检查用户是否有推荐人（推荐关系永久有效，不再检查有效期）
                const { data: healthInfo } = await supabase
                    .from('jk_user_health_info')
                    .select('referrer_id')
                    .eq('user_id', userId)
                    .single();
                
                if (healthInfo?.referrer_id) {
                    // 获取推荐积分比例配置
                    let referralRate = 0.05; // 默认5%
                    try {
                        const { data: config } = await supabase
                            .from('jk_referral_config')
                            .select('value')
                            .eq('name', 'referral_rate')
                            .single();
                        if (config?.value) {
                            referralRate = parseFloat(config.value);
                        }
                    } catch (e) {
                        console.log('获取推荐比例配置失败，使用默认值');
                    }
                    
                    // 计算推荐积分
                    const pointsEarned = amount * referralRate;
                    
                    // 获取推荐人当前积分
                    const { data: referrer } = await supabase
                        .from('jk_users')
                        .select('points')
                        .eq('id', healthInfo.referrer_id)
                        .single();
                    
                    // 更新推荐人积分
                    const newPoints = (referrer?.points || 0) + pointsEarned;
                    await supabase
                        .from('jk_users')
                        .update({ points: newPoints })
                        .eq('id', healthInfo.referrer_id);
                    
                    // 保存推荐积分记录
                    await supabase
                        .from('jk_referral_points')
                        .insert({
                            referrer_id: healthInfo.referrer_id,
                            referred_user_id: userId,
                            consumption_id: consumptionId,
                            points_earned: pointsEarned,
                            percentage: referralRate
                        });
                    
                    alert(`消费录入成功！推荐人获得 ${pointsEarned.toFixed(2)} 积分（${(referralRate * 100).toFixed(0)}%消费奖励）`);
                } else {
                    alert('消费录入成功！');
                }
                
                closeModal();
                loadAdminUsers();
            } catch (err) {
                console.error('消费录入错误:', err);
                alert('操作失败，请重试：' + err.message);
            }
        }

            document.getElementById('modalBody').innerHTML = `

                    <label>积分数量</label>

            `;

        // 提交添加/扣除积分
        async function submitAddPoints(userId) {
            const points = parseFloat(document.getElementById('pointsAmount').value);
            
            if (isNaN(points) || points === 0) {
                alert('请输入有效的积分数量（不能为0）');
                return;
            }
            
            // 确保是整数
            const intPoints = Math.floor(points);
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    alert('系统错误，请刷新页面重试');
                    return;
                }
                
                // 获取当前用户积分
                const { data: user } = await supabase
                    .from('jk_users')
                    .select('points')
                    .eq('id', userId)
                    .single();
                
                // 计算新积分
                const currentPoints = user?.points || 0;
                const newPoints = currentPoints + intPoints;
                
                // 更新用户积分
                await supabase
                    .from('jk_users')
                    .update({ points: newPoints })
                    .eq('id', userId);
                
                if (intPoints > 0) {
                    alert(`成功添加 ${intPoints} 积分！`);
                } else {
                    alert(`成功扣除 ${Math.abs(intPoints)} 积分！`);
                }
                
                closeModal();
                loadAdminUsers();
            } catch (err) {
                console.error('积分操作错误:', err);
                alert('操作失败，请重试');
            }
        }

                <textarea id="doctorReplyContent" rows="4" placeholder="输入医生回复内容..." style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; resize: none; margin-bottom: 15px;"></textarea>
                <button onclick="submitDoctorReply('${consultationId}')" style="padding: 12px 30px; background: #48bb78; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">提交回复</button>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }
        
        // 提交医生回复
        async function submitDoctorReply(consultationId) {
            const content = document.getElementById('doctorReplyContent').value;
            
            if (!content) {
                alert('请输入回复内容');
                return;
            }
            
            // 检查是否为管理员或医生
            if (currentUser.role !== 'admin' && currentUser.role !== 'doctor') {
                alert('只有管理员或医生才能回复咨询');
                return;
            }
            
            try {
                const supabase = getJkSupabase();
                
                const { error } = await supabase
                    .from('jk_consultation_replies')
                    .insert({
                        consultation_id: consultationId,
                        user_id: currentUser.id,
                        content,
                        is_doctor: true
                    });
                
                if (error) {
                    alert('回复失败：' + error.message);
                    return;
                }
                
                await supabase
                    .from('jk_consultations')
                    .update({ status: 'replied' })
                    .eq('id', consultationId);
                
                alert('回复成功！');
                closeModal();
                loadAdminConsultations();
            } catch (err) {
                alert('回复失败，请重试');
            }
        }
        
        // 加载推荐配置管理
        async function loadAdminReferral() {
            let configs = [];
            let referralStats = {
                totalReferrals: 0,
                totalPointsEarned: 0,
                avgPointsPerReferral: 0
            };
            
            // 加载系统配置
            await loadSystemConfig();
            const communityEnabled = systemConfig.community_enabled !== 'false';
            
            try {
                const { data: configData } = await supabase
                    .from('jk_referral_config')
                    .select('*');
                configs = configData || [];
                
                const { data: pointsData } = await supabase
                    .from('jk_referral_points')
                    .select('points_earned');
                if (pointsData) {
                    referralStats.totalReferrals = pointsData.length;
                    referralStats.totalPointsEarned = pointsData.reduce((sum, item) => sum + (item.points_earned || 0), 0);
                    referralStats.avgPointsPerReferral = referralStats.totalReferrals > 0 
                        ? referralStats.totalPointsEarned / referralStats.totalReferrals 
                        : 0;
                }
            } catch (e) {
                console.log('获取配置失败');
            }
            
            // 默认配置
            const defaultConfigs = [
                { id: 1, name: 'referral_rate', value: '0.05', description: '推荐积分比例（消费金额的百分比）', created_at: '2024-01-01' },
                { id: 2, name: 'referral_valid_days', value: '30', description: '推荐关系有效期（天）', created_at: '2024-01-01' }
            ];
            
            const displayConfigs = configs.length > 0 ? configs : defaultConfigs;
            const currentRate = displayConfigs.find(c => c.name === 'referral_rate')?.value || '0.05';
            
            let html = `
                <h2 style="margin-bottom: 25px; color: #2d3748;">🎁 推荐配置管理</h2>
                
                <div class="stats-grid">
                    <div class="stat-card purple">
                        <div class="stat-label">推荐次数</div>
                        <div class="stat-value">${referralStats.totalReferrals}</div>
                        <div class="stat-unit">次</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-label">累计发放积分</div>
                        <div class="stat-value">${referralStats.totalPointsEarned.toFixed(2)}</div>
                        <div class="stat-unit">积分</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-label">平均每次奖励</div>
                        <div class="stat-value">${referralStats.avgPointsPerReferral.toFixed(2)}</div>
                        <div class="stat-unit">积分</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 20px; color: #4a5568;">系统功能开关</h3>
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #f7fafc; border-radius: 10px;">
                        <div>
                            <div style="font-weight: 600; color: #2d3748; margin-bottom: 5px;">健康社区功能</div>
                            <div style="color: #718096; font-size: 14px;">关闭后用户将无法访问健康社区板块</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="communityToggle" ${communityEnabled ? 'checked' : ''} onchange="toggleCommunity(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 20px; color: #4a5568;">推荐积分比例设置</h3>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <input type="number" step="0.01" min="0" max="1" id="referralRateInput" 
                               value="${currentRate}" 
                               style="width: 150px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <span style="font-size: 18px; font-weight: 600;">× 消费金额 = 推荐积分</span>
                        <button onclick="saveReferralRate()" style="padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">保存设置</button>
                    </div>
                    <div style="color: #718096; margin-top: 15px; font-size: 14px;">
                        当前比例: ${(parseFloat(currentRate) * 100).toFixed(0)}%，即用户每消费100元，推荐人获得 ${(parseFloat(currentRate) * 100).toFixed(0)} 积分
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 20px; color: #4a5568;">配置列表</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>配置名称</th>
                                <th>当前值</th>
                                <th>描述</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${displayConfigs.map(config => `
                                <tr>
                                    <td style="color: #2d3748;">${config.name === 'referral_rate' ? '推荐积分比例' : config.name === 'referral_valid_days' ? '推荐有效期（天）' : config.name}</td>
                                    <td style="color: #667eea; font-weight: 600;">${config.value}${config.name === 'referral_rate' ? '%' : ''}</td>
                                    <td style="color: #4a5568;">${config.description}</td>
                                    <td>
                                        <button onclick="editConfig('${config.name}', '${config.value}', '${config.description}')" style="padding: 6px 15px; background: #48bb78; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 13px;">编辑</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        // 保存推荐比例
        async function saveReferralRate() {
            const rate = parseFloat(document.getElementById('referralRateInput').value);
            
            if (isNaN(rate) || rate < 0 || rate > 1) {
                alert('请输入有效的比例（0-1之间）');
                return;
            }
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    alert('系统错误：Supabase未初始化');
                    return;
                }
                
                console.log('Supabase已初始化，开始查询配置...');
                
                const { data: existing, error: selectError } = await supabase
                    .from('jk_referral_config')
                    .select('id')
                    .eq('name', 'referral_rate')
                    .single();
                
                console.log('查询结果:', existing, selectError);
                
                if (selectError && selectError.code !== 'PGRST116') {
                    alert('查询配置失败：' + selectError.message);
                    return;
                }
                
                if (existing) {
                    console.log('找到现有配置，ID:', existing.id);
                    const { error: updateError, status } = await supabase
                        .from('jk_referral_config')
                        .update({ value: rate.toString() })
                        .eq('id', existing.id);
                    
                    console.log('更新结果:', status, updateError);
                    
                    if (updateError) {
                        alert('保存失败：' + updateError.message);
                        return;
                    }
                } else {
                    console.log('未找到现有配置，准备插入');
                    const { error: insertError, status } = await supabase
                        .from('jk_referral_config')
                        .insert({
                            name: 'referral_rate',
                            value: rate.toString(),
                            description: '推荐积分比例（消费金额的百分比）'
                        });
                    
                    console.log('插入结果:', status, insertError);
                    
                    if (insertError) {
                        alert('保存失败：' + insertError.message);
                        return;
                    }
                }
                
                alert('设置保存成功！');
                loadAdminReferral();
            } catch (err) {
                console.error('保存异常:', err);
                alert('保存失败，请重试：' + err.message);
            }
        }
        
        // 切换健康社区开关
        async function toggleCommunity(enabled) {
            console.log('切换健康社区开关:', enabled);
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    console.error('Supabase 客户端未初始化');
                    alert('系统错误，请刷新页面重试');
                    document.getElementById('communityToggle').checked = !enabled;
                    return;
                }
                
                const { data: existing, error: selectError } = await supabase
                    .from('jk_system_config')
                    .select('id')
                    .eq('config_key', 'community_enabled')
                    .single();
                
                if (selectError && selectError.code !== 'PGRST116') { // PGRST116 是找不到数据的错误码
                    console.error('查询配置失败:', selectError);
                    alert('查询配置失败：' + selectError.message);
                    document.getElementById('communityToggle').checked = !enabled;
                    return;
                }
                
                if (existing) {
                    const { error: updateError } = await supabase
                        .from('jk_system_config')
                        .update({ config_value: enabled.toString() })
                        .eq('id', existing.id);
                    
                    if (updateError) {
                        console.error('更新配置失败:', updateError);
                        alert('保存失败：' + updateError.message);
                        document.getElementById('communityToggle').checked = !enabled;
                        return;
                    }
                } else {
                    const { error: insertError } = await supabase
                        .from('jk_system_config')
                        .insert({
                            config_key: 'community_enabled',
                            config_value: enabled.toString(),
                            description: '是否启用健康社区功能'
                        });
                    
                    if (insertError) {
                        console.error('插入配置失败:', insertError);
                        alert('保存失败：' + insertError.message);
                        document.getElementById('communityToggle').checked = !enabled;
                        return;
                    }
                }
                
                // 更新本地缓存
                systemConfig.community_enabled = enabled.toString();
                
                // 更新导航栏显示
                updateNavByConfig();
                
                alert(`健康社区功能已${enabled ? '开启' : '关闭'}！`);
                console.log('健康社区开关保存成功');
            } catch (err) {
                console.error('切换社区开关失败:', err);
                document.getElementById('communityToggle').checked = !enabled;
                alert('操作失败，请重试：' + err.message);
            }
        }
        
        // 编辑配置
        function editConfig(name, value, description) {
            document.getElementById('modalTitle').textContent = `编辑配置 - ${name}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>配置值</label>
                    <input type="text" id="configValue" value="${value}">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="configDesc" value="${description}">
                </div>
                <button onclick="submitConfigEdit('${name}')" style="padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">保存</button>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }
        
        // 提交配置编辑
        async function submitConfigEdit(name) {
            const value = document.getElementById('configValue').value;
            const description = document.getElementById('configDesc').value;
            
            if (!value) {
                alert('请输入配置值');
                return;
            }
            
            try {
                const supabase = getJkSupabase();
                
                if (!supabase) {
                    alert('系统错误，请刷新页面重试');
                    return;
                }
                
                const { error } = await supabase
                    .from('jk_referral_config')
                    .update({ value, description })
                    .eq('name', name);
                
                if (error) {
                    alert('更新失败：' + error.message);
                    return;
                }
                
                alert('配置更新成功！');
                closeModal();
                loadAdminReferral();
            } catch (err) {
                alert('更新失败，请重试：' + err.message);
            }
        }
        
        // 退出登录
        async function logout() {
            try {
                await supabase.auth.signOut();
                currentUser = null;
                showLogin();
            } catch (err) {
                alert('退出失败，请重试');
            }
        }
        
        // 绑定事件
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginBtn').addEventListener('click', login);
            document.getElementById('regBtn').addEventListener('click', register);
        });
    </script>
</body>
</html>

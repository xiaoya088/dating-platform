<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 缘来是你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto;
            display: flex;
            height: calc(100vh - 40px);
            gap: 20px;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .sidebar {
            width: 350px;
            background: white;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { color: #333; font-size: 1.3rem; }
        
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 14px;
        }
        
        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .conversation-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.3s;
        }
        .conversation-item:hover { background: #f8f9fa; }
        .conversation-item.active { background: #667eea15; border-left: 4px solid #667eea; }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .conversation-info {
            flex: 1;
            min-width: 0;
        }
        .conversation-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        .conversation-last {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conversation-time {
            font-size: 11px;
            color: #bbb;
            flex-shrink: 0;
        }
        
        .chat-area {
            flex: 1;
            background: white;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .chat-header-info {
            flex: 1;
        }
        .chat-header-name { font-weight: 600; color: #333; }
        .chat-header-status { font-size: 12px; color: #2ed573; }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            display: flex;
            margin-bottom: 15px;
        }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            position: relative;
        }
        .message.sent .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.received .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        
        .message-text { font-size: 14px; line-height: 1.5; }
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }
        
        .chat-input-area {
            padding: 15px 20px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
        }
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); }
        
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        .empty-icon { font-size: 4rem; margin-bottom: 15px; }
        .empty-title { font-size: 1.2rem; margin-bottom: 5px; }
        .empty-desc { font-size: 14px; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        .btn-danger { background: #ff4757; }
        .btn-primary { background: #667eea; }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .sidebar { width: 100%; max-height: 300px; }
            .chat-area { min-height: 400px; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <a href="profile.html" class="back-link">← 返回个人中心</a>
    <h1>💬 消息中心</h1>
    
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>消息列表</h2>
                <button class="btn btn-primary" onclick="refreshConversations()">🔄 刷新</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索联系人..." onkeyup="searchConversations()">
            </div>
            <div class="conversation-list" id="conversationList">
                <div style="text-align: center; padding: 30px; color: #999;">加载中...</div>
            </div>
        </div>
        
        <div class="chat-area">
            <div id="chatEmpty" class="empty-state">
                <div class="empty-icon">💬</div>
                <div class="empty-title">选择一个对话</div>
                <div class="empty-desc">点击左侧列表开始聊天</div>
            </div>
            
            <div id="chatContent" class="hidden">
                <div class="chat-header">
                    <div class="chat-header-avatar" id="chatAvatar"></div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chatName"></div>
                        <div class="chat-header-status" id="chatStatus">在线</div>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages"></div>
                
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="messageInput" placeholder="输入消息..." onkeyup="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('datingCurrentUser'));
        let currentChatUserId = null;

        if (!currentUser) {
            window.location.href = 'login.html';
        }

        function loadConversations() {
            const messages = JSON.parse(localStorage.getItem('datingMessages')) || [];
            const users = JSON.parse(localStorage.getItem('datingUsers')) || [];
            
            const conversations = {};
            messages.forEach(msg => {
                const key = msg.from == currentUser.id ? msg.to : msg.from;
                if (!conversations[key]) {
                    conversations[key] = {
                        userId: key,
                        lastMessage: msg,
                        count: 0
                    };
                }
                conversations[key].lastMessage = msg;
                conversations[key].count++;
            });

            const conversationList = Object.values(conversations)
                .sort((a, b) => b.lastMessage.id - a.lastMessage.id);

            let html = '';
            if (conversationList.length === 0) {
                html = '<div style="text-align: center; padding: 30px; color: #999;">暂无消息</div>';
            } else {
                conversationList.forEach(convo => {
                    const user = users.find(u => u.id == convo.userId);
                    if (!user) return;
                    
                    const isActive = currentChatUserId == convo.userId;
                    html += `
                        <div class="conversation-item ${isActive ? 'active' : ''}" onclick="openChat(${convo.userId})">
                            <div class="avatar">${user.gender === '男' ? '👨' : '👩'}</div>
                            <div class="conversation-info">
                                <div class="conversation-name">${user.username}</div>
                                <div class="conversation-last">${convo.lastMessage.content}</div>
                            </div>
                            <div class="conversation-time">${formatTime(convo.lastMessage.timestamp)}</div>
                        </div>
                    `;
                });
            }

            document.getElementById('conversationList').innerHTML = html;
        }

        function formatTime(timestamp) {
            const now = new Date();
            const msgDate = new Date(timestamp.replace(/\//g, '-'));
            
            const diffMs = now - msgDate;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return '刚刚';
            if (diffMins < 60) return `${diffMins}分钟前`;
            if (diffHours < 24) return `${diffHours}小时前`;
            if (diffDays < 7) return `${diffDays}天前`;
            return timestamp;
        }

        function searchConversations() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.conversation-item');
            
            items.forEach(item => {
                const name = item.querySelector('.conversation-name').textContent.toLowerCase();
                if (name.includes(keyword)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function openChat(userId) {
            currentChatUserId = userId;
            const users = JSON.parse(localStorage.getItem('datingUsers')) || [];
            const user = users.find(u => u.id == userId);
            
            if (!user) return;

            document.getElementById('chatEmpty').classList.add('hidden');
            document.getElementById('chatContent').classList.remove('hidden');
            
            document.getElementById('chatAvatar').textContent = user.gender === '男' ? '👨' : '👩';
            document.getElementById('chatName').textContent = user.username;
            
            loadChatMessages();
            loadConversations();
        }

        function loadChatMessages() {
            if (!currentChatUserId) return;
            
            const messages = JSON.parse(localStorage.getItem('datingMessages')) || [];
            const chatMessages = messages.filter(m => 
                (m.from == currentUser.id && m.to == currentChatUserId) ||
                (m.from == currentChatUserId && m.to == currentUser.id)
            ).sort((a, b) => a.id - b.id);

            let html = '';
            chatMessages.forEach(msg => {
                const isSent = msg.from == currentUser.id;
                html += `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-content">
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${msg.timestamp}</div>
                        </div>
                    </div>
                `;
            });

            const chatMessagesDiv = document.getElementById('chatMessages');
            chatMessagesDiv.innerHTML = html;
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();
            if (!content || !currentChatUserId) return;

            const message = {
                id: Date.now(),
                from: currentUser.id,
                to: currentChatUserId,
                content: content,
                type: 'text',
                timestamp: new Date().toLocaleString('zh-CN')
            };

            const messages = JSON.parse(localStorage.getItem('datingMessages')) || [];
            messages.push(message);
            localStorage.setItem('datingMessages', JSON.stringify(messages));

            document.getElementById('messageInput').value = '';
            loadChatMessages();
            loadConversations();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function refreshConversations() {
            loadConversations();
        }

        function updateNavLinks() {
            const links = document.querySelectorAll('a[href="profile.html"]');
            if (links.length > 0 && currentUser) {
                const userDataStr = JSON.stringify(currentUser);
                const encodedData = encodeURIComponent(userDataStr);
                links.forEach(link => {
                    link.href = 'profile.html?user=' + encodedData;
                });
            }
        }

        loadConversations();
        updateNavLinks();
    </script>
</body>
</html>

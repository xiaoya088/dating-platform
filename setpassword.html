<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置密码 - 缘来是你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        h1 {
            color: #c44569;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff6b9d;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 设置密码</h1>
        <p class="subtitle">请设置您的登录密码</p>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="setPasswordForm">
            <div class="form-group">
                <label for="password">设置密码</label>
                <input type="password" id="password" placeholder="请输入密码（至少6位）" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            
            <button type="submit" class="btn">确认设置</button>
        </form>
    </div>

    <script>
        const userId = localStorage.getItem('tempUserId');
        
        if (!userId) {
            window.location.href = 'login.html';
        }
        
        document.getElementById('setPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password.length < 6) {
                document.getElementById('errorMessage').textContent = '密码长度至少6位';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('errorMessage').textContent = '两次输入的密码不一致';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('datingUsers')) || [];
            const userIndex = users.findIndex(u => u.id === parseInt(userId));
            
            if (userIndex === -1) {
                document.getElementById('errorMessage').textContent = '用户不存在';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            users[userIndex].password = password;
            localStorage.setItem('datingUsers', JSON.stringify(users));
            localStorage.setItem('datingCurrentUser', JSON.stringify(users[userIndex]));
            localStorage.removeItem('tempUserId');
            
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').textContent = '密码设置成功！即将跳转到完善资料页面...';
            document.getElementById('successMessage').style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匹配详情 - 缘来是你婚恋红娘系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .match-detail-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #0056b3;
        }
        
        .user-info-card {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            flex-shrink: 0;
        }
        
        .user-details {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-meta {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .match-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }
        
        .match-list {
            margin-top: 15px;
        }
        
        .match-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .match-user-info {
            flex: 1;
        }
        
        .match-user-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .match-user-meta {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        
        .match-user-meta div {
            margin-bottom: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .match-user-meta strong {
            color: #333;
            min-width: 50px;
            flex-shrink: 0;
        }
        
        .match-scores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .score-box {
            text-align: center;
            padding: 12px 8px;
            border-radius: 8px;
        }
        
        .score-a-to-b {
            background: #e8f5e9;
            border: 2px solid #28a745;
        }
        
        .score-b-to-a {
            background: #fff3e0;
            border: 2px solid #ff9800;
        }
        
        .score-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .score-value {
            font-size: 22px;
            font-weight: 700;
        }
        
        .score-a-to-b .score-value {
            color: #28a745;
        }
        
        .score-b-to-a .score-value {
            color: #ff9800;
        }
        
        .loading, .empty {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
        
        @media (min-width: 768px) {
            .match-detail-container {
                padding: 20px;
            }
            
            .user-info-card {
                padding: 30px;
                gap: 20px;
            }
            
            .user-avatar {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            
            .user-name {
                font-size: 28px;
            }
            
            .user-meta {
                font-size: 14px;
            }
            
            .match-stats {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
            
            .match-card {
                flex-direction: row;
                align-items: flex-start;
                gap: 20px;
            }
            
            .match-user-name {
                font-size: 18px;
            }
            
            .match-scores {
                grid-template-columns: repeat(3, auto);
                border-top: none;
                padding-top: 0;
            }
            
            .score-box {
                min-width: 100px;
            }
        }
        
        @media (min-width: 1024px) {
            .match-detail-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="match-detail-container">
        <div class="back-btn" onclick="window.close()">← 关闭页面</div>
        
        <div id="userInfoCard" class="user-info-card">
            <div class="loading">正在加载用户信息...</div>
        </div>
        
        <h2 style="margin-bottom: 20px; color: #333;">匹配对象列表</h2>
        <div id="matchList" class="match-list">
            <div class="loading">正在加载匹配信息...</div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // 获取URL参数中的用户ID
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            
            if (!userId) {
                document.getElementById('userInfoCard').innerHTML = '<div class="empty">未指定用户ID</div>';
                document.getElementById('matchList').innerHTML = '';
                return;
            }
            
            try {
                // 获取用户基本信息
                const { data: user, error: userError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();
                
                if (userError) throw userError;
                if (!user) {
                    document.getElementById('userInfoCard').innerHTML = '<div class="empty">用户不存在</div>';
                    return;
                }
                
                // 计算年龄
                const age = user.birthday ? Math.floor((new Date() - new Date(user.birthday)) / (365.25 * 24 * 60 * 60 * 1000)) : '未知';
                
                // 获取用户的匹配结果（A->B）
                const { data: matchResults, error: matchError } = await supabaseClient
                    .from('match_results')
                    .select('target_user_id, score')
                    .eq('user_id', userId)
                    .eq('is_filtered', false)
                    .order('score', { ascending: false });
                
                if (matchError) throw matchError;
                
                // 获取用户作为推荐对象的匹配结果（B->A）
                const { data: reverseMatchResults, error: reverseError } = await supabaseClient
                    .from('match_results')
                    .select('user_id, score')
                    .eq('target_user_id', userId)
                    .eq('is_filtered', false);
                
                if (reverseError) throw reverseError;
                
                // 创建反向匹配映射
                const reverseMatchMap = {};
                (reverseMatchResults || []).forEach(m => {
                    reverseMatchMap[m.user_id] = m.score;
                });
                
                // 计算统计数据
                const avgScore = matchResults && matchResults.length > 0 
                    ? Math.round(matchResults.reduce((sum, m) => sum + m.score, 0) / matchResults.length)
                    : 0;
                const maxScore = matchResults && matchResults.length > 0 
                    ? Math.max(...matchResults.map(m => m.score))
                    : 0;
                const avgReverseScore = reverseMatchResults && reverseMatchResults.length > 0
                    ? Math.round(reverseMatchResults.reduce((sum, m) => sum + m.score, 0) / reverseMatchResults.length)
                    : 0;
                
                // 显示用户信息卡片
                const userInfoHtml = `
                    <div class="user-avatar">${user.gender === '男' ? '👨' : user.gender === '女' ? '👩' : '👤'}</div>
                    <div class="user-details">
                        <div class="user-name">${user.name || '未命名'}</div>
                        <div class="user-meta">
                            ${user.gender || '未知性别'} | ${age}岁 | ${user.current_address || '未知地区'} | ${user.education || '未知学历'}
                        </div>
                        <div class="user-meta" style="margin-top: 5px;">
                            手机: ${user.phone || '未填写'} | 微信: ${user.wechat || '未填写'}
                        </div>
                        <div class="match-stats">
                            <div class="stat-item">
                                <div class="stat-value">${matchResults ? matchResults.length : 0}</div>
                                <div class="stat-label">匹配对象数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${avgScore}分</div>
                                <div class="stat-label">平均匹配分(A→B)</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${avgReverseScore}分</div>
                                <div class="stat-label">平均被匹配分(B→A)</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${maxScore}分</div>
                                <div class="stat-label">最高匹配分</div>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('userInfoCard').innerHTML = userInfoHtml;
                
                // 如果没有匹配对象
                if (!matchResults || matchResults.length === 0) {
                    document.getElementById('matchList').innerHTML = '<div class="empty">暂无匹配对象</div>';
                    return;
                }
                
                // 获取所有匹配对象的详细信息
                const targetUserIds = matchResults.map(m => m.target_user_id);
                const { data: targetUsers, error: targetError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .in('id', targetUserIds);
                
                if (targetError) throw targetError;
                
                // 创建用户映射
                const userMap = {};
                (targetUsers || []).forEach(u => {
                    userMap[u.id] = u;
                });
                
                // 显示匹配列表
                let matchListHtml = '';
                matchResults.forEach((match, index) => {
                    const targetUser = userMap[match.target_user_id];
                    if (!targetUser) return;
                    
                    const targetAge = targetUser.birthday 
                        ? Math.floor((new Date() - new Date(targetUser.birthday)) / (365.25 * 24 * 60 * 60 * 1000))
                        : '未知';
                    
                    const reverseScore = reverseMatchMap[match.target_user_id] || 0;
                    
                    // 计算综合匹配度（双向平均）
                    const combinedScore = Math.round((match.score + reverseScore) / 2);
                    
                    matchListHtml += `
                        <div class="match-card">
                            <div class="match-user-info">
                                <div class="match-user-name">
                                    ${index + 1}. ${targetUser.name || '未命名'}
                                    <span style="font-size: 14px; color: #999; margin-left: 10px;">
                                        ${targetUser.gender === '男' ? '👨' : targetUser.gender === '女' ? '👩' : '👤'}
                                    </span>
                                </div>
                                <div class="match-user-meta">
                                    <div><strong>性别:</strong> ${targetUser.gender || '未知'}</div>
                                    <div><strong>年龄:</strong> ${targetAge}岁</div>
                                    <div><strong>地区:</strong> ${targetUser.current_address || '未知'}</div>
                                    <div><strong>学历:</strong> ${targetUser.education || '未知'}</div>
                                    <div><strong>手机:</strong> ${targetUser.phone || '未填写'}</div>
                                    <div><strong>微信:</strong> ${targetUser.wechat || '未填写'}</div>
                                    <div><strong>职业:</strong> ${targetUser.occupation || '未填写'}</div>
                                    <div><strong>身高:</strong> ${targetUser.height || '未填写'}cm</div>
                                </div>
                            </div>
                            <div class="match-scores">
                                <div class="score-box score-a-to-b">
                                    <div class="score-label">A→B 匹配分</div>
                                    <div class="score-value">${match.score}</div>
                                </div>
                                <div class="score-box score-b-to-a">
                                    <div class="score-label">B→A 匹配分</div>
                                    <div class="score-value">${reverseScore}</div>
                                </div>
                                <div class="score-box" style="background: #f3e5f5; border: 2px solid #9c27b0;">
                                    <div class="score-label">综合匹配度</div>
                                    <div class="score-value" style="color: #9c27b0;">${combinedScore}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                document.getElementById('matchList').innerHTML = matchListHtml;
                
            } catch (error) {
                console.error('加载匹配详情失败:', error);
                document.getElementById('userInfoCard').innerHTML = `<div class="empty" style="color: #dc3545;">加载失败: ${error.message}</div>`;
                document.getElementById('matchList').innerHTML = '';
            }
        });
    </script>
</body>
</html>

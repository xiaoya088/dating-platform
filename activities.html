<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚恋红娘系统 - 线下活动</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">💕 婚恋红娘系统 <span id="userNameDisplay" style="font-size: 14px; color: #888; font-weight: normal; margin-left: 10px;"></span></div>
        <ul class="navbar-nav">
            <li><a href="match.html">匹配推荐</a></li>
            <li><a href="messages.html">私信 <span id="msgBadge" class="badge" style="display:none; background:#ff4757; color:#fff; border-radius:10px; padding:2px 8px; font-size:12px; margin-left:5px;">0</span></a></li>
            <li><a href="announcements.html">公告</a></li>
            <li><a href="activities.html" class="active">线下活动</a></li>
            <li><a href="profile.html">个人资料</a></li>
            <li><a href="#" onclick="logout()">退出</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="card">
            <div class="card-header">报名活动</div>
            
            <div id="activityList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="cancelModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span>取消报名</span>
                <button class="modal-close" onclick="closeCancelModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>取消原因 *</label>
                    <textarea id="cancelReason" rows="4" placeholder="请填写取消原因"></textarea>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="closeCancelModal()">取消</button>
                    <button class="btn btn-danger" onclick="confirmCancel()">确认取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="alertBox" class="hidden"></div>
    
    <script>
        let currentUser = null;
        let cancelActivityId = null;
        let userRegistrations = [];
        
        async function initPage() {
            console.log('activities.html initializing...');
            
            currentUser = getCurrentUser();
            console.log('currentUser from sessionStorage:', currentUser);
            console.log('currentUser.id:', currentUser?.id);
            
            if (!currentUser) {
                console.log('No currentUser, redirecting to index.html');
                window.location.href = 'index.html';
                return;
            }
            
            if (!currentUser.id) {
                console.error('currentUser has no id field!');
                showAlert('用户信息不完整，请重新登录', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }
            
            document.getElementById('userNameDisplay').textContent = `欢迎, ${currentUser.name || '用户'}`;
            
            loadActivities();
        }
        
        document.addEventListener('DOMContentLoaded', initPage);
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }
        
        function showCancelModal(activityId) {
            cancelActivityId = activityId;
            document.getElementById('cancelReason').value = '';
            document.getElementById('cancelModal').classList.remove('hidden');
        }
        
        function closeCancelModal() {
            cancelActivityId = null;
            document.getElementById('cancelReason').value = '';
            document.getElementById('cancelModal').classList.add('hidden');
        }
        
        async function confirmCancel() {
            const reason = document.getElementById('cancelReason').value.trim();
            
            if (!reason) {
                showAlert('请填写取消原因', 'error');
                return;
            }
            
            if (!cancelActivityId) {
                showAlert('操作无效', 'error');
                return;
            }
            
            const supabase = getSupabase();
            
            try {
                const { data: regData, error: fetchError } = await supabase
                    .from('activity_registrations')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .eq('activity_id', cancelActivityId)
                    .single();
                
                if (fetchError && fetchError.code !== 'PGRST116') {
                    throw fetchError;
                }
                
                if (regData) {
                    const { error: updateError } = await supabase
                        .from('activity_registrations')
                        .update({
                            status: 'cancelled',
                            cancel_reason: reason,
                            cancelled_at: new Date().toISOString()
                        })
                        .eq('id', regData.id);
                    
                    if (updateError) {
                        throw updateError;
                    }
                }
                
                const { data: activityData, error: actError } = await supabase
                    .from('activities')
                    .select('current_participants')
                    .eq('id', cancelActivityId)
                    .single();
                
                if (!actError && activityData) {
                    await supabase
                        .from('activities')
                        .update({
                            current_participants: Math.max(0, (activityData.current_participants || 0) - 1)
                        })
                        .eq('id', cancelActivityId);
                }
                
                showAlert('取消报名成功', 'success');
                closeCancelModal();
                loadActivities();
            } catch (e) {
                console.error('取消报名失败:', e);
                showAlert('取消报名失败: ' + e.message, 'error');
            }
        }
        
        async function registerActivity(activityId) {
            const supabase = getSupabase();
            
            try {
                const { data: existing, error: checkError } = await supabase
                    .from('activity_registrations')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .eq('activity_id', activityId)
                    .maybeSingle();
                
                if (checkError && checkError.code !== 'PGRST116') {
                    throw checkError;
                }
                
                if (existing) {
                    if (existing.status === 'cancelled') {
                        const { error: updateError } = await supabase
                            .from('activity_registrations')
                            .update({
                                status: 'active',
                                cancel_reason: null,
                                cancelled_at: null,
                                registered_at: new Date().toISOString()
                            })
                            .eq('id', existing.id);
                        
                        if (updateError) throw updateError;
                    } else {
                        showAlert('您已经报名过此活动', 'warning');
                        return;
                    }
                } else {
                    const { error: insertError } = await supabase
                        .from('activity_registrations')
                        .insert([{
                            user_id: currentUser.id,
                            activity_id: activityId,
                            status: 'active',
                            registered_at: new Date().toISOString()
                        }]);
                    
                    if (insertError) throw insertError;
                }
                
                const { data: activityData, error: actError } = await supabase
                    .from('activities')
                    .select('current_participants')
                    .eq('id', activityId)
                    .single();
                
                if (!actError && activityData) {
                    await supabase
                        .from('activities')
                        .update({
                            current_participants: (activityData.current_participants || 0) + 1
                        })
                        .eq('id', activityId);
                }
                
                showAlert('报名成功', 'success');
                loadActivities();
            } catch (e) {
                console.error('报名失败:', e);
                showAlert('报名失败: ' + e.message, 'error');
            }
        }
        
        async function loadActivities() {
            const supabase = getSupabase();
            const activityList = document.getElementById('activityList');
            
            console.log('loadActivities called, currentUser:', currentUser);
            
            if (!currentUser || !currentUser.id) {
                activityList.innerHTML = '<p style="text-align: center; color: #e74c3c; padding: 40px;">用户未登录或登录已过期</p>';
                return;
            }
            
            activityList.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
            
            try {
                const { data: activities, error: actError } = await supabase
                    .from('activities')
                    .select('*')
                    .order('activity_time', { ascending: true });
                
                console.log('activities result:', activities);
                console.log('actError:', actError);
                
                if (actError) {
                    activityList.innerHTML = `<p style="text-align: center; color: #e74c3c; padding: 40px;">加载失败: ${actError.message}</p>`;
                    return;
                }
                
                const { data: registrations, error: regError } = await supabase
                    .from('activity_registrations')
                    .select('*')
                    .eq('user_id', currentUser.id);
                
                console.log('registrations result:', registrations);
                console.log('regError:', regError);
                
                if (regError) {
                    activityList.innerHTML = `<p style="text-align: center; color: #e74c3c; padding: 40px;">加载失败: ${regError.message}</p>`;
                    return;
                }
                
                userRegistrations = registrations || [];
                const registrationMap = {};
                userRegistrations.forEach(reg => {
                    registrationMap[reg.activity_id] = reg;
                });
                
                if (!activities || activities.length === 0) {
                    activityList.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">暂无可报名活动</p>';
                    return;
                }
                
                const now = new Date();
                const upcomingActivities = activities.filter(a => new Date(a.activity_time) >= now).sort((a, b) => new Date(a.activity_time) - new Date(b.activity_time));
                const pastActivities = activities.filter(a => new Date(a.activity_time) < now).sort((a, b) => new Date(b.activity_time) - new Date(a.activity_time));
                const sortedActivities = [...upcomingActivities, ...pastActivities];
                
                activityList.innerHTML = sortedActivities.map(activity => {
                    const reg = registrationMap[activity.id];
                    const isRegistered = reg && reg.status === 'active';
                    const isCancelled = reg && reg.status === 'cancelled';
                    const remaining = activity.max_participants - activity.current_participants;
                    const isFull = remaining <= 0 && !isRegistered;
                    const isPast = new Date(activity.activity_time) < now;
                    
                    let actionHtml = '';
                    if (isPast) {
                        actionHtml = '<span class="badge badge-secondary">已结束</span>';
                    } else if (isRegistered) {
                        actionHtml = `<span class="badge badge-success">已报名</span><button class="btn btn-danger btn-small" style="min-width: 80px;" onclick="showCancelModal('${activity.id}')">取消报名</button>`;
                    } else if (isFull) {
                        actionHtml = '<span class="badge badge-warning">已满</span>';
                    } else {
                        actionHtml = `<button class="btn btn-primary btn-small" style="min-width: 80px;" onclick="registerActivity('${activity.id}')">${isCancelled ? '重新报名' : '报名'}</button>`;
                    }
                    
                    return `
                        <div class="activity-card" style="${isCancelled ? 'opacity: 0.7;' : ''}${isPast ? 'opacity: 0.6;' : ''}">
                            <div class="activity-title">${activity.title}</div>
                            <div class="activity-meta">
                                📅 ${new Date(activity.activity_time).toLocaleString()} | 📍 ${activity.location} | 👥 剩余名额: ${remaining}
                            </div>
                            <div class="activity-description">${activity.description || '暂无详细描述'}</div>
                            <div class="activity-footer">
                                <div>
                                    ${isRegistered ? `报名时间: ${new Date(reg.registered_at).toLocaleString()}` : ''}
                                    ${isCancelled ? `<span style="color: #e74c3c;">取消原因: ${reg.cancel_reason || ''}</span>` : ''}
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    ${actionHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('loadActivities exception:', e);
                activityList.innerHTML = `<p style="text-align: center; color: #e74c3c; padding: 40px;">加载失败: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
